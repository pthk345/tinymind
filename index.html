<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="light-content">
<title>tiny-mind</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap');

*, *::before, *::after {
box-sizing: border-box; margin: 0; padding: 0;
-webkit-tap-highlight-color: transparent;
-webkit-touch-callout: none;
}

:root {
–bg:           #f7f4f0;
–warm-100:     #f0e8df;
–warm-200:     #e5d5c5;
–warm-300:     #d4bea8;
–orange:       #e07a3a;
–orange-light: #eda06a;
–orange-pale:  #fce8d8;
–text:         #26201a;
–text-soft:    #7a604e;
–text-muted:   #b09a88;
–glass:        #faf7f3;
–glass-border: rgba(210,185,165,0.55);
–shadow:       0 4px 24px rgba(80,45,15,0.10), 0 1px 4px rgba(80,45,15,0.06);
–shadow-lg:    0 12px 40px rgba(80,45,15,0.14), 0 2px 8px rgba(80,45,15,0.07);
–r: 16px;
}

html, body {
width: 100%; height: 100%;
overflow: hidden;
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
color: #26201a;
-webkit-font-smoothing: antialiased;
}

/* Dot grid */
/* dot grid moved to body background-image */

/* ── TOOLBAR ── */
#toolbar {
position: fixed;
top: env(safe-area-inset-top, 12px);
top: max(env(safe-area-inset-top), 12px);
left: 50%; transform: translateX(-50%);
z-index: 900;
display: flex; align-items: center; gap: 0;
padding: 6px 10px;
background: rgba(250,247,243,0.75);
border: 1px solid rgba(210,185,165,0.55);
border-radius: 999px;
backdrop-filter: blur(28px) saturate(1.6) brightness(1.04);
-webkit-backdrop-filter: blur(28px) saturate(1.6) brightness(1.04);
box-shadow: 0 4px 24px rgba(80,45,15,0.10), 0 1px 4px rgba(80,45,15,0.06), inset 0 1px 0 rgba(255,255,255,0.9);
white-space: nowrap;
max-width: calc(100vw - 24px);
}

.tb-brand {
font-family: ‘Fraunces’, Georgia, ‘Times New Roman’, serif;
font-size: 15px; font-weight: 400;
color: #26201a; letter-spacing: -0.3px;
padding: 0 4px 0 4px;
border-right: 1px solid #e5d5c5;
margin-right: 4px;
max-width: 180px;
overflow: hidden;
white-space: nowrap;
flex-shrink: 1;
position: relative;
-webkit-mask-image: linear-gradient(to right, #000 70%, transparent 100%);
mask-image: linear-gradient(to right, #000 70%, transparent 100%);
}

.tb-btn {
display: flex; align-items: center; gap: 5px;
padding: 7px 11px;
background: none; border: none; border-radius: 999px;
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Arial, sans-serif;
font-size: 13px; font-weight: 400;
color: #7a604e;
cursor: pointer;
transition: background 0.15s, color 0.15s;
touch-action: manipulation;
}
.tb-btn:active { background: #f0e8df; }
.tb-btn.on { background: #e07a3a; color: #fff; }
.tb-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

.tb-sep { width: 1px; height: 18px; background: #e5d5c5; margin: 0 1px; flex-shrink: 0; }

#zoom-label {
font-size: 12px; font-weight: 400; color: #b09a88;
padding: 0 4px; min-width: 36px; text-align: center;
}

/* ── CANVAS ── */
#wrap {
position: fixed; inset: 0; z-index: 1;
overflow: hidden;
touch-action: none;
background: transparent;
}

#canvas {
position: absolute;
width: 8000px; height: 8000px;
transform-origin: 0 0;
will-change: transform;
}

/* ── SVG CONNECTIONS ── */
#svg-layer {
position: absolute; inset: 0;
width: 100%; height: 100%;
pointer-events: none; overflow: visible;
}
.c-line {
fill: none;
stroke: rgba(224,122,58,0.45);
stroke-width: 2;
stroke-linecap: round;
pointer-events: stroke;
cursor: pointer;
transition: stroke 0.2s, stroke-width 0.2s;
}
.c-line:hover, .c-line.hi { stroke: #e07a3a; stroke-width: 2.5; }
#draw-line {
fill: none; stroke: #e07a3a;
stroke-width: 2; stroke-dasharray: 5 4;
stroke-linecap: round; pointer-events: none;
opacity: 0.7; display: none;
}

/* ── NOTE ── */
.note {
position: absolute;
width: 220px;
min-width: 180px;
background: rgba(250,247,243,0.78);
border: 1px solid rgba(210,185,165,0.55);
border-radius: 16px;
box-shadow: 0 4px 24px rgba(80,45,15,0.10), 0 1px 4px rgba(80,45,15,0.06), inset 0 1px 0 rgba(255,255,255,0.9);
backdrop-filter: blur(18px) saturate(1.5);
-webkit-backdrop-filter: blur(18px) saturate(1.5);
transition: box-shadow 0.2s, transform 0.12s;
user-select: none;
touch-action: none;
display: flex;
flex-direction: column;
overflow: hidden;
}
.note.drag {
box-shadow: 0 12px 40px rgba(80,45,15,0.14), 0 2px 8px rgba(80,45,15,0.07);
transform: scale(1.03) rotate(-0.8deg);
z-index: 500 !important;
transition: box-shadow 0.1s;
}
/* When note has explicit height, inner body scrolls */
.note .n-body {
flex: 1;
overflow: hidden;
min-height: 20px;
display: flex;
flex-direction: column;
}
.note.sel { box-shadow: 0 0 0 2.5px #eda06a, 0 12px 40px rgba(80,45,15,0.14), 0 2px 8px rgba(80,45,15,0.07); }

.n-head {
flex-shrink: 0;
display: flex; align-items: center; gap: 6px;
padding: 10px 10px 0;
cursor: grab;
}
.n-head:active { cursor: grabbing; }

.n-dot { width: 7px; height: 7px; border-radius: 50%; background: #eda06a; flex-shrink: 0; }

.n-title {
flex: 1; font-family: ‘Fraunces’, Georgia, ‘Times New Roman’, serif;
font-size: 13px; font-weight: 400; color: #26201a;
background: none; border: none; outline: none;
width: 100%; user-select: text; cursor: text;
min-width: 0;
}
.n-title::placeholder { color: #b09a88; }

.n-img-btn {
width: 28px; height: 28px; flex-shrink: 0;
display: flex; align-items: center; justify-content: center;
background: none; border: none; border-radius: 8px;
color: #b09a88; cursor: pointer;
transition: background 0.15s, color 0.15s;
touch-action: manipulation;
}
.n-img-btn:active { background: #f0e8df; color: #26201a; }
.n-img-btn svg { width: 13px; height: 13px; }

.n-body { padding: 6px 10px 8px; }

.n-text {
font-size: 12.5px; line-height: 1.55; color: #7a604e;
background: none; border: none; outline: none;
resize: none; width: 100%;
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Arial, sans-serif;
user-select: text; cursor: text; min-height: 46px;
}
.n-text::placeholder { color: #b09a88; }

.n-media { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; overflow: hidden; }
.n-media-item {
position: relative; border-radius: 10px; overflow: hidden;
background: #f0e8df;
}
.n-media-item img, .n-media-item video {
width: 100%; display: block;
height: auto; max-height: none;
object-fit: contain;
border-radius: 10px;
}
.n-media-rm {
position: absolute; top: 4px; right: 4px;
width: 20px; height: 20px;
background: rgba(255,255,255,0.88); border: none; border-radius: 50%;
font-size: 10px; cursor: pointer; color: #7a604e;
display: flex; align-items: center; justify-content: center;
}

.n-foot {
flex-shrink: 0;
display: flex; align-items: center; flex-wrap: wrap; gap: 4px;
padding: 5px 10px 9px;
border-top: 1px solid #f0e8df;
margin-top: auto;
}
.n-tag {
font-size: 10.5px; padding: 2px 7px;
background: #fce8d8; color: #e07a3a;
border-radius: 999px; font-weight: 500;
border: none; cursor: pointer; font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Arial, sans-serif;
touch-action: manipulation;
}
.n-tag.add { background: #f0e8df; color: #b09a88; }

/* Connect dots - shown only in connect mode */
.cdot { display: none; }
.connect-mode .cdot {
display: block;
position: absolute;
width: 12px; height: 12px;
background: #e07a3a; border: 2px solid white;
border-radius: 50%;
z-index: 10;
box-shadow: 0 1px 4px rgba(80,40,10,0.2);
touch-action: manipulation; cursor: pointer;
}
.cdot.t { top: -6px;    left: 50%; margin-left: -6px; }
.cdot.b { bottom: -6px; left: 50%; margin-left: -6px; }
.cdot.l { left: -6px;   top: 50%;  margin-top: -6px; }
.cdot.r { right: -6px;  top: 50%;  margin-top: -6px; }

/* ── FAB (boards button) ── */
#fab {
position: fixed;
left: 20px;
bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
width: 66px; height: 66px;
border-radius: 50%;
background: none;
background-color: transparent;
border: none; cursor: pointer;
box-shadow: none;
display: flex; align-items: center; justify-content: center;
z-index: 800;
transition: transform 0.18s, opacity 0.18s;
touch-action: manipulation;
overflow: hidden;
padding: 0;
}
#fab:active { transform: scale(0.92); opacity: 0.85; }
#fab img {
width: 66px; height: 66px;
object-fit: cover;
border-radius: 50%;
display: block;
box-shadow: 0 4px 20px rgba(224,122,58,0.45), 0 1px 4px rgba(80,40,10,0.1);
}

/* ── BOARDS PANEL ── */
/* ── BOARDS PANEL – working style ── */
#boards-panel {
position: fixed;
left: 12px;
bottom: calc(env(safe-area-inset-bottom, 0px) + 92px);
width: min(260px, calc(100vw - 24px));
background: rgba(255,253,250,0.88);
border: 1.5px solid rgba(224,122,58,0.22);
border-radius: 28px;
backdrop-filter: blur(40px) saturate(1.8) brightness(1.05);
-webkit-backdrop-filter: blur(40px) saturate(1.8) brightness(1.05);
box-shadow: 0 20px 60px rgba(80,40,10,0.18), 0 2px 8px rgba(80,40,10,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
z-index: 850;
overflow: hidden;
display: none;
animation: panelIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes panelIn {
from { opacity: 0; transform: translateY(14px) scale(0.94); }
to   { opacity: 1; transform: translateY(0) scale(1); }
}
#boards-panel.open { display: block; }

#boards-list {
padding: 12px 10px 8px;
max-height: 380px;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
}

.board-item {
display: flex; align-items: center; gap: 14px;
padding: 13px 14px;
border-radius: 18px;
cursor: pointer;
transition: background 0.14s;
touch-action: manipulation;
margin-bottom: 2px;
}
.board-item:active { background: #f0e8df; }
.board-item.active { background: #fce8d8; }

.board-circle {
width: 36px; height: 36px; border-radius: 50%;
flex-shrink: 0; display: flex; align-items: center; justify-content: center;
font-family: ‘Fraunces’, Georgia, serif;
font-size: 15px; font-weight: 400;
transition: border 0.2s;
}
.board-circle.active-c {
border: 2.5px solid #e07a3a;
background: rgba(224,122,58,0.12);
color: #e07a3a;
}
.board-circle:not(.active-c) {
background: rgba(100,70,40,0.10);
color: #7a604e;
}

.board-name {
font-size: 17px; font-weight: 400;
color: #26201a; flex: 1;
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, sans-serif;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
letter-spacing: -0.2px;
}
.board-item.active .board-name { font-weight: 500; color: #e07a3a; }

.board-del {
width: 26px; height: 26px; flex-shrink: 0;
background: none; border: none; border-radius: 50%;
color: #b09a88; font-size: 14px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
touch-action: manipulation;
opacity: 0; transition: opacity 0.15s;
}
.board-item:hover .board-del,
.board-item:focus-within .board-del { opacity: 1; }

#boards-footer {
border-top: 1px solid #e5d5c5;
padding: 12px 14px 14px;
}
#btn-new-board {
width: 100%;
display: flex; align-items: center; justify-content: center; gap: 8px;
padding: 12px;
background: rgba(255,252,248,0.6);
border: 1px solid rgba(210,185,165,0.45);
border-radius: 16px;
font-size: 14px; font-weight: 400; color: #7a604e;
cursor: pointer; font-family: ‘DM Sans’, -apple-system, sans-serif;
transition: background 0.15s, box-shadow 0.15s;
touch-action: manipulation;
backdrop-filter: blur(12px) saturate(1.4);
-webkit-backdrop-filter: blur(12px) saturate(1.4);
box-shadow: 0 2px 8px rgba(80,45,15,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
}
#btn-new-board:active { background: rgba(240,232,223,0.8); box-shadow: inset 0 1px 4px rgba(80,45,15,0.1); }
#btn-new-board svg { width: 15px; height: 15px; }

/* Toast */
#toast {
position: fixed; bottom: calc(env(safe-area-inset-bottom,0px) + 110px);
left: 50%; transform: translateX(-50%);
background: rgba(38,32,26,0.82);
color: white; font-size: 13px;
padding: 8px 16px; border-radius: 999px;
opacity: 0; transition: opacity 0.25s;
pointer-events: none; z-index: 9999;
white-space: nowrap;
backdrop-filter: blur(12px);
}
#toast.show { opacity: 1; }

#file-input { display: none; }

/* Bottom-right fit button */
#btn-fit-br {
position: fixed;
right: 20px;
bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
width: 44px; height: 44px;
border-radius: 50%;
background: #faf7f3;
border: 1px solid rgba(210,185,165,0.55);
backdrop-filter: blur(20px) saturate(1.4);
-webkit-backdrop-filter: blur(20px) saturate(1.4);
box-shadow: 0 4px 24px rgba(80,45,15,0.10), 0 1px 4px rgba(80,45,15,0.06);
display: flex; align-items: center; justify-content: center;
cursor: pointer; z-index: 800;
transition: transform 0.15s, box-shadow 0.15s;
touch-action: manipulation;
}
#btn-fit-br:active { transform: scale(0.9); box-shadow: none; }
#btn-fit-br svg { width: 18px; height: 18px; color: #7a604e; }

/* ── SEARCH IN TOOLBAR ── */
#tb-search-wrap {
display: flex; align-items: center; gap: 5px;
padding: 4px 8px 4px 6px;
border-radius: 999px;
transition: background 0.15s;
min-width: 80px;
max-width: 160px;
flex-shrink: 1;
}
#tb-search-wrap:focus-within {
background: #f0e8df;
}
#tb-search-icon {
width: 13px; height: 13px; flex-shrink: 0;
color: #b09a88;
transition: color 0.15s;
}
#tb-search-wrap:focus-within #tb-search-icon { color: #e07a3a; }
#tb-search {
border: none; outline: none; background: transparent;
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, sans-serif;
font-size: 13px; font-weight: 400; color: #26201a;
width: 100%; min-width: 40px;
}
#tb-search::placeholder { color: #b09a88; }
#tb-search-clear {
display: none;
background: none; border: none; cursor: pointer;
font-size: 10px; color: #b09a88; padding: 0;
width: 14px; height: 14px; flex-shrink: 0;
border-radius: 50%;
align-items: center; justify-content: center;
touch-action: manipulation;
}
#tb-search-clear.visible { display: flex; }
#tb-search-clear:active { background: #e5d5c5; }

/* search highlight on notes */
.note.search-match {
box-shadow: 0 0 0 2.5px #e07a3a, 0 4px 24px rgba(80,45,15,0.15) !important;
}
.note.search-hidden {
opacity: 0.2;
pointer-events: none;
}

/* ── RESIZE HANDLE (connect mode only) ── */
.note-resize {
display: none;
position: absolute;
bottom: 5px; right: 5px;
width: 18px; height: 18px;
background: #e07a3a;
border: 2.5px solid white;
border-radius: 50%;
z-index: 30;
cursor: se-resize;
box-shadow: 0 2px 8px rgba(80,40,10,0.35), 0 0 0 1px rgba(224,122,58,0.3);
touch-action: none;
transition: transform 0.12s, box-shadow 0.12s;
/* Diagonal resize arrow inside */
}
.connect-mode .note-resize {
display: block;
}
.connect-mode .note-resize:hover {
transform: scale(1.25);
box-shadow: 0 3px 12px rgba(224,122,58,0.5), 0 0 0 2px rgba(224,122,58,0.25);
}
.connect-mode .note-resize:active {
transform: scale(1.15);
}

/* ── MODAL ── */
#modal-overlay {
display: none;
position: fixed;
inset: 0;
z-index: 2000;
background: rgba(38,32,26,0.45);
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(8px);
align-items: center;
justify-content: center;
}
#modal-overlay.open {
display: flex;
}
#modal-box {
background: #faf7f3;
border-radius: 20px;
padding: 24px 20px 20px;
width: min(300px, calc(100vw - 40px));
box-shadow: 0 20px 60px rgba(80,40,10,0.22), 0 2px 8px rgba(80,40,10,0.1);
display: flex;
flex-direction: column;
gap: 14px;
}
#modal-box h3 {
font-family: ‘Fraunces’, Georgia, serif;
font-size: 18px; font-weight: 400;
color: #26201a; margin: 0;
}
#modal-input {
border: 1.5px solid rgba(210,185,165,0.7);
border-radius: 12px;
padding: 10px 12px;
font-size: 15px;
font-family: ‘DM Sans’, -apple-system, sans-serif;
color: #26201a;
background: white;
outline: none;
width: 100%;
box-sizing: border-box;
}
#modal-input:focus {
border-color: #e07a3a;
}
.modal-btns {
display: flex;
gap: 10px;
justify-content: flex-end;
}
.modal-btn {
padding: 9px 20px;
border-radius: 999px;
border: none;
font-size: 14px;
font-family: ‘DM Sans’, -apple-system, sans-serif;
cursor: pointer;
touch-action: manipulation;
}
.modal-btn.cancel {
background: #f0e8df;
color: #7a604e;
}
.modal-btn.create {
background: #e07a3a;
color: white;
}
.modal-btn.cancel:active { background: #e5d5c5; }
.modal-btn.create:active { background: #c85e1a; }

/* ── NOTE DELETE BUTTON (connect mode only) ── */
.note-delete {
display: none;
position: absolute;
top: 6px; right: 6px;
width: 20px; height: 20px;
background: none;
border: none;
z-index: 30;
cursor: pointer;
touch-action: manipulation;
transition: transform 0.12s, opacity 0.12s;
align-items: center; justify-content: center;
color: #d94f3a;
padding: 0;
}
.connect-mode .note-delete {
display: flex;
}
.connect-mode .note-delete:hover { transform: scale(1.2); }
.connect-mode .note-delete:active { opacity: 0.7; }

/* Hide media upload button in connect mode */
.connect-mode .n-img-btn {
display: none !important;
}

/* ── SETTINGS PANEL ── */
#settings-panel {
display: none;
position: fixed;
inset: 0;
z-index: 1900;
align-items: flex-end;
justify-content: flex-start;
padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 100px);
padding-left: 12px;
}
#settings-panel.open { display: flex; }

#settings-box {
background: rgba(250,247,243,0.88);
backdrop-filter: blur(40px) saturate(1.8);
-webkit-backdrop-filter: blur(40px) saturate(1.8);
border: 1px solid rgba(210,185,165,0.45);
border-radius: 24px;
box-shadow: 0 16px 48px rgba(80,40,10,0.18), inset 0 1px 0 rgba(255,255,255,0.9);
padding: 16px;
width: 220px;
animation: panelIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
}

#settings-header {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 14px;
}
#settings-title {
font-family: ‘Fraunces’, Georgia, serif;
font-size: 16px; color: #26201a;
}
#settings-close {
background: none; border: none; cursor: pointer;
font-size: 13px; color: #b09a88; padding: 2px 6px;
border-radius: 999px; touch-action: manipulation;
}
#settings-close:active { background: #f0e8df; }

#settings-colors {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 10px;
margin-bottom: 14px;
}
.bg-swatch {
width: 100%; aspect-ratio: 1;
border-radius: 50%;
border: 2px solid rgba(0,0,0,0.08);
cursor: pointer;
touch-action: manipulation;
transition: transform 0.12s, box-shadow 0.12s;
position: relative;
}
.bg-swatch:active { transform: scale(0.9); }
.bg-swatch.active {
box-shadow: 0 0 0 3px #e07a3a;
border-color: transparent;
}

#settings-custom {
display: flex; align-items: center; justify-content: space-between;
padding: 10px 12px;
background: rgba(255,255,255,0.5);
border-radius: 14px;
border: 1px solid rgba(210,185,165,0.4);
}
#settings-custom span {
font-size: 13px; color: #7a604e;
font-family: ‘DM Sans’, sans-serif;
}
#bg-color-picker {
width: 32px; height: 32px;
border: none; border-radius: 50%;
cursor: pointer; padding: 0;
background: none;
outline: none;
}
</style>

    </div>

      <button class="bg-swatch" data-color="#f0e8f0" style="background:#f0e8f0" title="Лаванда"></button>

<input type="file" id="file-input" accept="image/*,video/*" multiple>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// STORAGE HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function saveBoards() {
  try {
    const data = { boards, activeBoardId };
    localStorage.setItem('board-app-v2', JSON.stringify(data));
  } catch(e) {}
}

function loadBoards() {
  try {
    const raw = localStorage.getItem('board-app-v2');
    if (raw) {
      const d = JSON.parse(raw);
      boards = d.boards || [];
      activeBoardId = d.activeBoardId || null;
      return true;
    }
  } catch(e) {}
  return false;
}

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let boards = [];          // [{id, name, notes:[], connections:[], vx, vy, vz}]
let activeBoardId = null;

let vx = 0, vy = 0, vz = 1;
const MIN_Z = 0.12, MAX_Z = 3;

let nextNoteId = 1;
let nextConnId = 1;

// Touch / pointer state
let pointers = {};        // id → {x,y}
let lastPinchDist = null;
let lastPinchMid  = null;

let isPanning = false;
let panStart  = null;

let isDragging = false, dragNoteId = null, dragOff = {x:0,y:0};
let connectMode = false, connectSrc = null;

let pendingMediaNoteId = null;

// ─────────────────────────────────────────────────────────────────────────────
// DOM
// ─────────────────────────────────────────────────────────────────────────────
const wrap        = document.getElementById('wrap');
const canvas      = document.getElementById('canvas');
const svgLayer    = document.getElementById('svg-layer');
const drawLine    = document.getElementById('draw-line');
const zoomLabel   = document.getElementById('zoom-label'); // may be null
const boardLabel  = document.getElementById('board-name-label');
const btnConnect  = document.getElementById('btn-connect');
const boardsPanel = document.getElementById('boards-panel');
const boardsList  = document.getElementById('boards-list');
const fileInput   = document.getElementById('file-input');

// ─────────────────────────────────────────────────────────────────────────────
// BOARD MANAGEMENT
// ─────────────────────────────────────────────────────────────────────────────
function currentBoard() { return boards.find(b => b.id === activeBoardId); }

function createBoard(name) {
  const id = 'b' + Date.now();
  const board = { id, name, notes: [], connections: [], vx: 0, vy: 0, vz: 1 };
  boards.push(board);
  saveBoards();
  return board;
}

function switchBoard(id) {
  // Clear search when switching boards
  const _sq = document.getElementById('tb-search');
  if (_sq && _sq.value) {
    _sq.value = '';
    const _cl = document.getElementById('tb-search-clear');
    if (_cl) _cl.classList.remove('visible');
    // search-match/hidden classes will be cleared when notes re-render
  }
  // Save current viewport
  const cur = currentBoard();
  if (cur) { cur.vx = vx; cur.vy = vy; cur.vz = vz; }

  activeBoardId = id;
  const board = currentBoard();
  if (!board) return;

  // Clear canvas
  document.querySelectorAll('.note').forEach(e => e.remove());
  document.querySelectorAll('.c-line').forEach(e => e.remove());

  // Restore viewport
  vx = board.vx || 0; 
  vy = board.vy || 0; 
  vz = board.vz || 1;
  applyTransform();

  // Restore notes
  board.notes.forEach(n => renderNote(n));

  // Restore connections
  board.connections.forEach(c => renderConnection(c));

  boardLabel.textContent = board.name;
  saveBoards();
  renderBoardsList();
}

function deleteBoard(id) {
  if (boards.length <= 1) { showToast('Cannot delete last board'); return; }
  boards = boards.filter(b => b.id !== id);
  if (activeBoardId === id) {
    activeBoardId = boards[0].id;
    switchBoard(activeBoardId);
  }
  saveBoards();
  renderBoardsList();
}

// ─────────────────────────────────────────────────────────────────────────────
// BOARD PANEL UI
// ─────────────────────────────────────────────────────────────────────────────
const BOARD_COLORS = ['#e07a3a','#c0845a','#a87660','#8b6050','#d4946a','#bf8060','#e8a07a'];

function getBoardColor(idx) { return BOARD_COLORS[idx % BOARD_COLORS.length]; }

function renderBoardsList() {
  boardsList.innerHTML = '';
  boards.forEach((b, i) => {
    const isActive = b.id === activeBoardId;
    const item = document.createElement('div');
    item.className = 'board-item' + (isActive ? ' active' : '');

    const circle = document.createElement('div');
    circle.className = 'board-circle' + (isActive ? ' active-c' : '');
    circle.textContent = b.name.charAt(0).toUpperCase();

    const name = document.createElement('div');
    name.className = 'board-name';
    name.textContent = b.name;

    const del = document.createElement('button');
    del.className = 'board-del';
    del.innerHTML = '✕';
    del.title = 'Удалить';
    del.addEventListener('click', e => { e.stopPropagation(); deleteBoard(b.id); });

    item.appendChild(circle);
    item.appendChild(name);
    item.appendChild(del);
    item.addEventListener('click', () => {
      switchBoard(b.id);
      closeBoardsPanel();
    });
    boardsList.appendChild(item);
  });
}

function openBoardsPanel() {
  renderBoardsList();
  boardsPanel.classList.add('open');
}
function closeBoardsPanel() { boardsPanel.classList.remove('open'); }

document.getElementById('fab').addEventListener('click', e => {
  e.stopPropagation();
  boardsPanel.classList.contains('open') ? closeBoardsPanel() : openBoardsPanel();
});

document.getElementById('btn-new-board').addEventListener('click', () => {
  closeBoardsPanel();
  openModal();
});

document.addEventListener('click', e => {
  if (!boardsPanel.contains(e.target) && e.target.id !== 'fab') closeBoardsPanel();
});

// ─────────────────────────────────────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────────────────────────────────────
const modalOverlay = document.getElementById('modal-overlay');
const modalInput   = document.getElementById('modal-input');

function openModal() {
  modalInput.value = '';
  modalOverlay.classList.add('open');
  setTimeout(() => modalInput.focus(), 100);
}
function closeModal() { modalOverlay.classList.remove('open'); }

document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-create').addEventListener('click', () => {
  const name = modalInput.value.trim();
  if (!name) { modalInput.focus(); return; }
  const board = createBoard(name);
  switchBoard(board.id);
  closeModal();
  showToast('Board "' + name + '" created');
});
modalInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modal-create').click();
  if (e.key === 'Escape') closeModal();
});
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

// ─────────────────────────────────────────────────────────────────────────────
// VIEWPORT
// ─────────────────────────────────────────────────────────────────────────────
function applyTransform() {
  canvas.style.transform = `translate(${vx}px,${vy}px) scale(${vz})`;
  if (zoomLabel) zoomLabel.textContent = Math.round(vz * 100) + '%';
  updateAllConnections();
}

function screenToCanvas(sx, sy) {
  const r = wrap.getBoundingClientRect();
  return { x: (sx - r.left - vx) / vz, y: (sy - r.top - vy) / vz };
}

function clamp(v,a,b) { return Math.max(a,Math.min(b,v)); }

function zoomAround(factor, cx, cy) {
  const r = wrap.getBoundingClientRect();
  const mx = cx - r.left, my = cy - r.top;
  const nz = clamp(vz * factor, MIN_Z, MAX_Z);
  vx = mx - (mx - vx) * (nz / vz);
  vy = my - (my - vy) * (nz / vz);
  vz = nz;
  applyTransform();
}

// ── SEARCH ──────────────────────────────────────────────────────────────────
const tbSearch = document.getElementById('tb-search');
const tbSearchClear = document.getElementById('tb-search-clear');

function doSearch(query) {
  const board = currentBoard();
  if (!board) return;
  const q = query.trim().toLowerCase();
  
  board.notes.forEach(note => {
    const el = document.getElementById('note-' + note.id);
    if (!el) return;
    if (!q) {
      el.classList.remove('search-match', 'search-hidden');
      return;
    }
    const title = (note.title || '').toLowerCase();
    const text  = (note.text  || '').toLowerCase();
    const tags  = (note.tags  || []).join(' ').toLowerCase();
    const match = title.includes(q) || text.includes(q) || tags.includes(q);
    el.classList.toggle('search-match',  match);
    el.classList.toggle('search-hidden', !match);
  });
}

function clearSearch() {
  tbSearch.value = '';
  tbSearchClear.classList.remove('visible');
  doSearch('');
}

tbSearch.addEventListener('input', e => {
  const q = e.target.value;
  tbSearchClear.classList.toggle('visible', q.length > 0);
  doSearch(q);
});

tbSearch.addEventListener('keydown', e => {
  if (e.key === 'Escape') clearSearch();
  e.stopPropagation(); // prevent canvas events
});

tbSearch.addEventListener('pointerdown', e => e.stopPropagation());
tbSearchClear.addEventListener('click', clearSearch);

// Search cleared in switchBoard function directly
// btn-fit removed from toolbar; now bottom-right
document.getElementById('btn-fit-br').addEventListener('click', fitAll);

function fitAll() {
  const board = currentBoard();
  if (!board || !board.notes.length) return;
  const r = wrap.getBoundingClientRect();
  const pad = 70;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  board.notes.forEach(n => {
    const el = document.getElementById('note-'+n.id);
    const w = el ? el.offsetWidth : 200;
    const h = el ? el.offsetHeight : 150;
    minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + w);
    maxY = Math.max(maxY, n.y + h);
  });
  const bw = maxX-minX+pad*2, bh = maxY-minY+pad*2;
  const nz = clamp(Math.min(r.width/bw, r.height/bh), MIN_Z, MAX_Z);
  vx = (r.width  - bw*nz)/2 - (minX-pad)*nz;
  vy = (r.height - bh*nz)/2 - (minY-pad)*nz;
  vz = nz;
  applyTransform();
  // Save viewport on current board
  board.vx = vx; board.vy = vy; board.vz = vz;
  saveBoards();
}

// ─────────────────────────────────────────────────────────────────────────────
// NOTES
// ─────────────────────────────────────────────────────────────────────────────
function addNote(x, y) {
  const board = currentBoard();
  if (!board) return null;
  const id = nextNoteId++;
  const note = { id, x, y, title: '', text: '', media: [], tags: [], zIndex: id };
  board.notes.push(note);
  renderNote(note);
  saveBoards();
  // Re-apply active search to new note
  const _sq = document.getElementById('tb-search');
  if (_sq && _sq.value.trim()) doSearch(_sq.value);
  return note;
}

function renderNote(note) {
  const old = document.getElementById('note-'+note.id);
  if (old) old.remove();

  const el = document.createElement('div');
  el.className = 'note';
  el.id = 'note-'+note.id;
  // Apply saved size if exists
  const noteW = note.w ? note.w + 'px' : '220px';
  const noteH = note.h ? note.h + 'px' : '';
  el.style.cssText = `left:${note.x}px;top:${note.y}px;z-index:${note.zIndex};width:${noteW};${note.h ? 'height:' + noteH + ';' : ''}`;

  // No corner dots – connect via tap on note body in connect mode
  // Resize handle – bottom-right, visible only in connect mode
  const resizeHandle = document.createElement('div');
  resizeHandle.className = 'note-resize';
  resizeHandle.title = 'Изменить размер';
  resizeHandle.innerHTML = '';
  el.appendChild(resizeHandle);
  resizeHandle.addEventListener('pointerdown', e => onResizePointerDown(e, note, el));

  // Delete button – top-right, connect mode only
  const deleteBtn = document.createElement('div');
  deleteBtn.className = 'note-delete';
  deleteBtn.title = 'Удалить заметку';
  deleteBtn.innerHTML = '<svg viewBox="0 0 12 12" width="14" height="14" fill="none" stroke="#d94f3a" stroke-width="2.2" stroke-linecap="round"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg>';
  el.appendChild(deleteBtn);
  deleteBtn.addEventListener('click', e => {
    e.stopPropagation();
    deleteNote(note.id);
  });

  // Header
  const head = document.createElement('div');
  head.className = 'n-head';

  const dot = document.createElement('div'); dot.className = 'n-dot';
  const title = document.createElement('input');
  title.className = 'n-title'; title.type = 'text';
  title.placeholder = 'Title…'; title.value = note.title;
  title.addEventListener('input', e => { note.title = e.target.value; saveBoards(); });
  title.addEventListener('pointerdown', e => e.stopPropagation());

  const imgBtn = document.createElement('button');
  imgBtn.className = 'n-img-btn'; imgBtn.title = 'Add image';
  imgBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="14" rx="3"/><polyline points="3 13 8 8 12 12 16 8 21 13"/></svg>`;
  imgBtn.addEventListener('pointerdown', e => e.stopPropagation());
  imgBtn.addEventListener('click', e => { e.stopPropagation(); pendingMediaNoteId = note.id; fileInput.click(); });

  head.appendChild(dot); head.appendChild(title); head.appendChild(imgBtn);

  // Body
  const body = document.createElement('div'); body.className = 'n-body';
  const ta = document.createElement('textarea');
  ta.className = 'n-text'; ta.placeholder = 'Write something…';
  ta.value = note.text; ta.rows = 3;
  ta.addEventListener('input', e => {
    note.text = e.target.value;
    e.target.style.height = 'auto';
    e.target.style.height = e.target.scrollHeight + 'px';
    saveBoards();
  });
  ta.addEventListener('pointerdown', e => e.stopPropagation());

  const mediaList = document.createElement('div');
  mediaList.className = 'n-media'; mediaList.id = 'media-'+note.id;
  note.media.forEach(m => appendMediaItem(mediaList, note, m));

  body.appendChild(ta); body.appendChild(mediaList);

  // Footer
  const foot = document.createElement('div'); foot.className = 'n-foot';
  note.tags.forEach(tag => {
    const t = document.createElement('button');
    t.className = 'n-tag'; t.textContent = tag;
    foot.appendChild(t);
  });
  const addTag = document.createElement('button');
  addTag.className = 'n-tag add'; addTag.textContent = '+ tag';
  addTag.addEventListener('pointerdown', e => e.stopPropagation());
  addTag.addEventListener('click', e => {
    e.stopPropagation();
    const tag = prompt('Tag:');
    if (tag && tag.trim()) { note.tags.push(tag.trim()); saveBoards(); renderNote(note); }
  });
  foot.appendChild(addTag);

  el.appendChild(head); el.appendChild(body); el.appendChild(foot);

  // Drag via header
  head.addEventListener('pointerdown', e => onNotePointerDown(e, note));
  el.addEventListener('pointerdown', () => bringToFront(note));
  el.addEventListener('click', e => {
    if (!connectMode) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
    if (e.target.closest('.note-delete') || e.target.closest('.note-resize')) return;
    e.stopPropagation();
    const tappedId = note.id;
    if (connectSrc === null) {
      connectSrc = tappedId;
      el.classList.add('sel');
      showToast('✓ Теперь тапни вторую заметку');
    } else {
      const fromId = connectSrc;
      connectSrc = null;
      const fromEl = document.getElementById('note-'+fromId);
      if (fromEl) fromEl.classList.remove('sel');
      if (tappedId !== fromId) createConnection(fromId, tappedId);
    }
  });

  // Double-tap to delete
  let lastTap = 0;
  head.addEventListener('click', e => {
    if (e.target === head || e.target === dot) {
      const now = Date.now();
      if (now - lastTap < 280) { deleteNote(note.id); }
      lastTap = now;
    }
  });

  canvas.appendChild(el);
  if (connectMode) el.classList.add('connect-mode');
}

function appendMediaItem(list, note, m) {
  const item = document.createElement('div'); item.className = 'n-media-item';
  let media;
  if (m.type === 'video') {
    media = document.createElement('video');
    media.src = m.src; media.controls = true; media.preload = 'metadata';
  } else {
    media = document.createElement('img'); media.src = m.src; media.alt = '';
  }
  const rm = document.createElement('button'); rm.className = 'n-media-rm'; rm.textContent = '✕';
  rm.addEventListener('click', e => {
    e.stopPropagation();
    note.media = note.media.filter(x => x.id !== m.id);
    item.remove(); saveBoards();
  });
  item.appendChild(media); item.appendChild(rm);
  list.appendChild(item);
}

fileInput.addEventListener('change', e => {
  const board = currentBoard(); if (!board) return;
  const note = board.notes.find(n => n.id === pendingMediaNoteId); if (!note) return;
  Array.from(e.target.files).forEach(file => {
    if (file.type.startsWith('video')) {
      // Videos stored as-is (can't compress easily)
      const reader = new FileReader();
      reader.onload = ev => {
        const m = { id: Date.now()+Math.random(), src: ev.target.result, type: 'video' };
        note.media.push(m);
        const list = document.getElementById('media-'+note.id);
        if (list) appendMediaItem(list, note, m);
        saveBoards();
      };
      reader.readAsDataURL(file);
    } else {
      // Images: compress via canvas before saving
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          // Scale down if too large (max 1200px on longest side)
          const MAX = 1200;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) {
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else       { w = Math.round(w * MAX / h); h = MAX; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          const compressed = canvas.toDataURL('image/jpeg', 0.72);
          const m = { id: Date.now()+Math.random(), src: compressed, type: 'image' };
          note.media.push(m);
          const list = document.getElementById('media-'+note.id);
          if (list) appendMediaItem(list, note, m);
          saveBoards();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }
  });
  fileInput.value = ''; pendingMediaNoteId = null;
});

function bringToFront(note) {
  const board = currentBoard(); if (!board) return;
  const maxZ = Math.max(...board.notes.map(n => n.zIndex), 0);
  note.zIndex = maxZ + 1;
  const el = document.getElementById('note-'+note.id);
  if (el) el.style.zIndex = note.zIndex;
}

function deleteNote(id) {
  const board = currentBoard(); if (!board) return;
  board.notes = board.notes.filter(n => n.id !== id);
  const el = document.getElementById('note-'+id); if (el) el.remove();
  const toRm = board.connections.filter(c => c.from===id||c.to===id);
  toRm.forEach(c => { board.connections = board.connections.filter(x=>x.id!==c.id); const l=document.getElementById('conn-'+c.id); if(l)l.remove(); });
  saveBoards();
}

// ─────────────────────────────────────────────────────────────────────────────
// NOTE DRAG (pointer events)
// ─────────────────────────────────────────────────────────────────────────────
function onNotePointerDown(e, note) {
  if (connectMode) return;
  if (['INPUT','TEXTAREA','BUTTON'].includes(e.target.tagName)) return;
  if (e.target.classList.contains('note-resize')) return; // let resize handle its own drag
  e.stopPropagation(); e.preventDefault();

  bringToFront(note);
  isDragging = true; dragNoteId = note.id;

  const pt = screenToCanvas(e.clientX, e.clientY);
  dragOff = { x: pt.x - note.x, y: pt.y - note.y };

  const el = document.getElementById('note-'+note.id);
  el.classList.add('drag');
  el.setPointerCapture(e.pointerId);

  el.addEventListener('pointermove', onDragMove);
  el.addEventListener('pointerup', onDragUp);
  el.addEventListener('pointercancel', onDragUp);
}

function onDragMove(e) {
  if (!isDragging) return;
  const board = currentBoard(); if (!board) return;
  const note = board.notes.find(n => n.id === dragNoteId); if (!note) return;
  const pt = screenToCanvas(e.clientX, e.clientY);
  note.x = pt.x - dragOff.x; note.y = pt.y - dragOff.y;
  const el = document.getElementById('note-'+note.id);
  if (el) { el.style.left = note.x+'px'; el.style.top = note.y+'px'; }
  updateAllConnections();
}

function onDragUp(e) {
  if (!isDragging) return;
  isDragging = false;
  const el = document.getElementById('note-'+dragNoteId);
  if (el) {
    el.classList.remove('drag');
    el.removeEventListener('pointermove', onDragMove);
    el.removeEventListener('pointerup', onDragUp);
    el.removeEventListener('pointercancel', onDragUp);
  }
  dragNoteId = null;
  saveBoards();
}

// ─────────────────────────────────────────────────────────────────────────────
// CONNECTIONS
// ─────────────────────────────────────────────────────────────────────────────
function noteCenter(id) {
  const el = document.getElementById('note-'+id); if (!el) return {x:0,y:0};
  return { x: parseInt(el.style.left)+el.offsetWidth/2, y: parseInt(el.style.top)+el.offsetHeight/2 };
}

function curvePath(x1,y1,x2,y2) {
  const dx = x2-x1;
  return `M${x1},${y1} C${x1+dx*0.45},${y1} ${x2-dx*0.45},${y2} ${x2},${y2}`;
}

function renderConnection(conn) {
  const old = document.getElementById('conn-'+conn.id); if (old) old.remove();
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.id = 'conn-'+conn.id; path.className.baseVal = 'c-line';
  path.addEventListener('click', e => {
    e.stopPropagation();
    if (confirm('Remove connection?')) {
      const board = currentBoard(); if (!board) return;
      board.connections = board.connections.filter(c => c.id !== conn.id);
      path.remove(); saveBoards();
    }
  });
  svgLayer.appendChild(path);
  updateConn(conn);
}

function updateConn(conn) {
  const path = document.getElementById('conn-'+conn.id); if (!path) return;
  const a = noteCenter(conn.from), b = noteCenter(conn.to);
  path.setAttribute('d', curvePath(a.x,a.y,b.x,b.y));
}

function updateAllConnections() {
  const board = currentBoard(); if (!board) return;
  board.connections.forEach(c => updateConn(c));
}

function createConnection(fromId, toId) {
  const board = currentBoard(); if (!board) return;
  if (fromId === toId) return;
  if (board.connections.find(c=>(c.from===fromId&&c.to===toId)||(c.from===toId&&c.to===fromId))) {
    showToast('Already connected'); return;
  }
  const conn = { id: nextConnId++, from: fromId, to: toId };
  board.connections.push(conn);
  renderConnection(conn);
  saveBoards();
  showToast('Connected ✓');
}

// ─────────────────────────────────────────────────────────────────────────────
// CONNECT DOT DRAG
// ─────────────────────────────────────────────────────────────────────────────

// ─── NOTE RESIZE (pointer drag on bottom-right handle) ───────────────────────
function onResizePointerDown(e, note, el) {
  if (!connectMode) return;
  e.stopPropagation();
  e.preventDefault();

  const startW  = el.offsetWidth;
  const startH  = el.offsetHeight;
  const startPX = e.clientX;
  const startPY = e.clientY;

  // Calculate smart minimum height based on actual content
  function calcMinSize() {
    const head = el.querySelector('.n-head');
    const foot = el.querySelector('.n-foot');
    const media = el.querySelector('.n-media');
    const headH = head ? head.offsetHeight : 38;
    const footH = foot ? foot.offsetHeight : 32;
    // If there are images, measure their natural rendered heights
    let mediaH = 0;
    if (media) {
      const imgs = media.querySelectorAll('img, video');
      imgs.forEach(img => { mediaH += img.naturalHeight > 0
        ? Math.min(img.offsetWidth * (img.naturalHeight / img.naturalWidth), img.offsetHeight)
        : img.offsetHeight; });
      if (imgs.length === 0) mediaH = media.offsetHeight;
    }
    // Min width = at least 160px; can't go narrower than images
    const minW = 160;
    // Min height = head + at least one line of text (20px) + media + footer
    const minH = headH + 20 + mediaH + footH + 10;
    return { minW, minH: Math.max(80, minH) };
  }

  el.setPointerCapture(e.pointerId);
  el.style.transition = 'none';

  function onMove(ev) {
    const dx = (ev.clientX - startPX) / vz;
    const dy = (ev.clientY - startPY) / vz;
    const { minW, minH } = calcMinSize();
    const newW = Math.max(minW, startW + dx);
    const newH = Math.max(minH, startH + dy);
    el.style.width  = newW + 'px';
    el.style.height = newH + 'px';
    note.w = newW;
    note.h = newH;
    updateAllConnections();
  }

  function onUp() {
    el.removeEventListener('pointermove', onMove);
    el.removeEventListener('pointerup',   onUp);
    el.removeEventListener('pointercancel', onUp);
    el.style.transition = '';
    saveBoards();
  }

  el.addEventListener('pointermove',   onMove);
  el.addEventListener('pointerup',     onUp);
  el.addEventListener('pointercancel', onUp);
}

function onCdotPointerDown(e) {
  if (!connectMode) return;
  e.stopPropagation(); e.preventDefault();
  const tappedId = parseInt(e.target.dataset.nid);
  if (connectSrc === null) {
    connectSrc = tappedId;
    const el = document.getElementById('note-'+connectSrc);
    el.classList.add('sel');
    showToast('Tap another note to connect');
  } else {
    const fromId = connectSrc;
    connectSrc = null;
    const fromEl = document.getElementById('note-'+fromId);
    if (fromEl) fromEl.classList.remove('sel');
    if (tappedId !== fromId) createConnection(fromId, tappedId);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// CANVAS TOUCH / POINTER (pan + pinch)
// ─────────────────────────────────────────────────────────────────────────────
wrap.addEventListener('pointerdown', e => {
  if (e.target !== wrap && e.target !== canvas && e.target !== svgLayer) return;
  pointers[e.pointerId] = {x: e.clientX, y: e.clientY};
  wrap.setPointerCapture(e.pointerId);

  const ids = Object.keys(pointers);
  if (ids.length === 1) {
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY, vx, vy };
  } else if (ids.length === 2) {
    isPanning = false;
    const [a,b] = Object.values(pointers);
    lastPinchDist = Math.hypot(a.x-b.x, a.y-b.y);
    lastPinchMid  = { x:(a.x+b.x)/2, y:(a.y+b.y)/2 };
  }
});

wrap.addEventListener('pointermove', e => {
  if (!pointers[e.pointerId]) return;
  pointers[e.pointerId] = {x: e.clientX, y: e.clientY};
  const ids = Object.keys(pointers);

  if (ids.length >= 2) {
    const vals = Object.values(pointers);
    const [a,b] = vals;
    const dist = Math.hypot(a.x-b.x, a.y-b.y);
    const mid  = { x:(a.x+b.x)/2, y:(a.y+b.y)/2 };
    if (lastPinchDist) {
      zoomAround(dist/lastPinchDist, mid.x, mid.y);
      // Also pan from mid movement
      const dmx = mid.x - lastPinchMid.x;
      const dmy = mid.y - lastPinchMid.y;
      vx += dmx; vy += dmy;
      applyTransform();
    }
    lastPinchDist = dist; lastPinchMid = mid;
  } else if (ids.length === 1 && isPanning && panStart) {
    vx = panStart.vx + (e.clientX - panStart.x);
    vy = panStart.vy + (e.clientY - panStart.y);
    applyTransform();
  }
});

wrap.addEventListener('pointerup', e => {
  delete pointers[e.pointerId];
  const ids = Object.keys(pointers);
  if (ids.length === 0) { isPanning = false; lastPinchDist = null; }
  else if (ids.length === 1) {
    const [p] = Object.values(pointers);
    panStart = { x: p.x, y: p.y, vx, vy };
    isPanning = true; lastPinchDist = null;
  }
});
wrap.addEventListener('pointercancel', e => {
  delete pointers[e.pointerId];
  if (Object.keys(pointers).length === 0) { isPanning = false; lastPinchDist = null; }
});

// Mouse wheel zoom
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.08 : 0.93;
  zoomAround(factor, e.clientX, e.clientY);
}, { passive: false });

// Double click / tap to add note
let lastTapCanvas = 0;
wrap.addEventListener('click', e => {
  if (e.target !== wrap && e.target !== canvas && e.target !== svgLayer) return;
  const now = Date.now();
  if (now - lastTapCanvas < 300) {
    const pt = screenToCanvas(e.clientX, e.clientY);
    const note = addNote(pt.x - 100, pt.y - 50);
    if (note) setTimeout(() => document.querySelector('#note-'+note.id+' .n-title')?.focus(), 60);
  }
  lastTapCanvas = now;
});

// ─────────────────────────────────────────────────────────────────────────────
// ADD NOTE BUTTON
// ─────────────────────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────────────────
// CONNECT MODE
// ─────────────────────────────────────────────────────────────────────────────
btnConnect.addEventListener('click', () => {
  connectMode = !connectMode;
  btnConnect.classList.toggle('on', connectMode);
  document.querySelectorAll('.note').forEach(el => el.classList.toggle('connect-mode', connectMode));
  // Reset any pending first-tap selection
  if (!connectMode && connectSrc !== null) {
    const el = document.getElementById('note-'+connectSrc);
    if (el) el.classList.remove('sel');
    connectSrc = null;
  }
  showToast(connectMode ? 'Тапни первую заметку' : 'Режим соединения выкл.');
});

// ─────────────────────────────────────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, dur=1800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), dur);
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
function init() {
  const loaded = loadBoards();

  if (!loaded || !boards.length) {
    // Create default board
    const b = createBoard('Board 1');
    activeBoardId = b.id;

    // Center canvas
    const r = wrap.getBoundingClientRect();
    const cx = 4000, cy = 4000;
    vx = r.width/2  - cx * vz;
    vy = r.height/2 - cy * vz;

    // Demo notes
    const n1 = addNote(cx-220, cy-70, 'Welcome', 'Double-tap canvas to add a note. Drag notes to move.');
    const n2 = addNote(cx+40,  cy-130);
    const n3 = addNote(cx-80,  cy+90);
    if (n1) { n1.title='Welcome'; n1.text='Double-tap canvas to add a note.'; document.querySelector('#note-'+n1.id+' .n-title').value='Welcome'; document.querySelector('#note-'+n1.id+' .n-text').value='Double-tap canvas to add a note.'; }
    if (n2) { n2.title='Ideas'; document.querySelector('#note-'+n2.id+' .n-title').value='Ideas'; }
    if (n3) { n3.title='Next Steps'; document.querySelector('#note-'+n3.id+' .n-title').value='Next Steps'; }

    setTimeout(() => {
      if(n1&&n2) createConnection(n1.id, n2.id);
      if(n1&&n3) createConnection(n1.id, n3.id);
    }, 80);

    b.vx = vx; b.vy = vy; b.vz = vz;
    applyTransform();
    saveBoards();
  } else {
    // Restore nextIds
    boards.forEach(b => {
      b.notes.forEach(n => { if (n.id >= nextNoteId) nextNoteId = n.id+1; });
      b.connections.forEach(c => { if (c.id >= nextConnId) nextConnId = c.id+1; });
    });
    // Switch to last active board
    if (!boards.find(b => b.id === activeBoardId)) activeBoardId = boards[0].id;
    switchBoard(activeBoardId);
  }
}

// ── SAVE HOOKS ── ensure data persists when leaving app
window.addEventListener('beforeunload', () => { saveViewport(); saveBoards(); });
// pagehide is critical for iOS Safari – fires when swiping away
window.addEventListener('pagehide', () => { saveViewport(); saveBoards(); });
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') { saveViewport(); saveBoards(); }
});
// Auto-save every 15s (faster than before)
setInterval(saveBoards, 15000);

function saveViewport() {
  const board = currentBoard();
  if (board) { board.vx = vx; board.vy = vy; board.vz = vz; }
}; // auto-save every 30s

// ── BACKGROUND COLOR SETTINGS ─────────────────────────────────────────────────
const settingsPanel = document.getElementById('settings-panel');
const bgColorPicker = document.getElementById('bg-color-picker');

function applyBgColor(color) {
  const dark = isColorDark(color);
  const dotColor = dark ? 'rgba(255,255,255,0.1)' : 'rgba(140,100,60,0.12)';
  const bgImage = `radial-gradient(circle, ${dotColor} 1.3px, transparent 1.3px)`;
  
  // Set on both body AND wrap to ensure visibility
  document.body.style.cssText += `;background-color:${color};background-image:${bgImage};background-size:26px 26px`;
  const wrap = document.getElementById('wrap');
  if (wrap) {
    wrap.style.backgroundColor = color;
    wrap.style.backgroundImage = bgImage;
    wrap.style.backgroundSize = '26px 26px';
  }
  // update active swatch
  document.querySelectorAll('.bg-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.color === color);
  });
  try { bgColorPicker.value = /^#[0-9a-f]{6}$/i.test(color) ? color : '#f7f4f0'; } catch(e){}
}

function isColorDark(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) < 128;
}

function saveBgColor(color) {
  try { localStorage.setItem('board-app-bgcolor', color); } catch(e) {}
}

function loadBgColor() {
  try { return localStorage.getItem('board-app-bgcolor') || '#f7f4f0'; } catch(e) { return '#f7f4f0'; }
}

// Init bg color
applyBgColor(loadBgColor());

// Settings button
document.getElementById('btn-settings').addEventListener('click', e => {
  e.stopPropagation();
  settingsPanel.classList.toggle('open');
});
document.getElementById('settings-close').addEventListener('click', () => {
  settingsPanel.classList.remove('open');
});
settingsPanel.addEventListener('click', e => {
  if (e.target === settingsPanel) settingsPanel.classList.remove('open');
});

// Preset swatches
document.querySelectorAll('.bg-swatch').forEach(swatch => {
  swatch.addEventListener('click', e => {
    e.stopPropagation();
    const color = swatch.dataset.color;
    applyBgColor(color);
    saveBgColor(color);
  });
});

// Custom color picker
bgColorPicker.addEventListener('input', e => {
  applyBgColor(e.target.value);
});
bgColorPicker.addEventListener('change', e => {
  applyBgColor(e.target.value);
  saveBgColor(e.target.value);
});
bgColorPicker.addEventListener('pointerdown', e => e.stopPropagation());


init();
</script>
