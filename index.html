<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>tiny-mind</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap');

*, *::before, *::after {
box-sizing: border-box; margin: 0; padding: 0;
-webkit-tap-highlight-color: transparent;
-webkit-touch-callout: none;
}

:root {
–bg:           #f7f4f0;
–warm-100:     #f0e8df;
–warm-200:     #e5d5c5;
–warm-300:     #d4bea8;
–orange:       #e07a3a;
–orange-light: #eda06a;
–orange-pale:  #fce8d8;
–text:         #26201a;
–text-soft:    #7a604e;
–text-muted:   #b09a88;
–glass:        #faf7f3;
–glass-border: rgba(210,185,165,0.55);
–shadow:       0 4px 24px rgba(80,45,15,0.10), 0 1px 4px rgba(80,45,15,0.06);
–shadow-lg:    0 12px 40px rgba(80,45,15,0.14), 0 2px 8px rgba(80,45,15,0.07);
–r: 16px;
}

html, body {
width: 100%; height: 100%;
overflow: hidden;
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
color: #26201a;
-webkit-font-smoothing: antialiased;
}

/* Dot grid */
/* dot grid moved to body background-image */

/* ── TOOLBAR ── */
#toolbar {
position: fixed;
top: max(env(safe-area-inset-top), 12px);
left: 50%; transform: translateX(-50%);
z-index: 900;
display: flex; align-items: center; gap: 2px;
padding: 5px 8px;
background: rgba(250,247,243,0.75);
border: 1px solid rgba(210,185,165,0.55);
border-radius: 999px;
backdrop-filter: blur(28px) saturate(1.6) brightness(1.04);
-webkit-backdrop-filter: blur(28px) saturate(1.6) brightness(1.04);
box-shadow: 0 4px 24px rgba(80,45,15,0.10), 0 1px 4px rgba(80,45,15,0.06), inset 0 1px 0 rgba(255,255,255,0.9);
white-space: nowrap;
max-width: calc(100vw - 24px);
}

.tb-btn {
display: flex; align-items: center; gap: 5px;
padding: 7px 10px;
background: none; border: none; border-radius: 999px;
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Arial, sans-serif;
font-size: 13px; font-weight: 400;
color: #7a604e;
cursor: pointer;
transition: background 0.15s, color 0.15s;
touch-action: manipulation;
white-space: nowrap;
}
.tb-btn:active { background: #f0e8df; }
.tb-btn.on { background: #e07a3a; color: #fff; }
.tb-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

.tb-sep { width: 1px; height: 18px; background: #e5d5c5; margin: 0 1px; flex-shrink: 0; }

#zoom-label {
font-size: 12px; font-weight: 400; color: #b09a88;
padding: 0 4px; min-width: 36px; text-align: center;
}

/* ── CANVAS ── */
#wrap {
position: fixed; inset: 0; z-index: 1;
overflow: hidden;
touch-action: none;
background: transparent;
isolation: isolate;
}

#canvas {
position: absolute;
width: 3000px; height: 3000px;
transform-origin: 0 0;
will-change: transform;
}

/* ── SVG CONNECTIONS ── */
#svg-layer {
position: absolute; inset: 0;
width: 100%; height: 100%;
pointer-events: none; overflow: visible;
}
.c-line {
fill: none;
stroke: #e07a3a;
stroke-opacity: 0.6;
stroke-width: 2;
stroke-linecap: round;
pointer-events: stroke;
cursor: pointer;
transition: stroke-width 0.2s;
animation: shimmerGlow 3s ease-in-out infinite;
}
.c-line:hover, .c-line.hi {
stroke-width: 2.8;
}
@keyframes shimmerGlow {
0%   { stroke-opacity: 0.45; stroke-width: 1.8; filter: none; }
45%  { stroke-opacity: 0.55; stroke-width: 2;   filter: none; }
50%  { stroke-opacity: 1;    stroke-width: 2.8; filter: drop-shadow(0 0 4px rgba(255,180,80,0.9)); }
55%  { stroke-opacity: 0.55; stroke-width: 2;   filter: none; }
100% { stroke-opacity: 0.45; stroke-width: 1.8; filter: none; }
}

#draw-line {
fill: none; stroke: #e07a3a;
stroke-width: 2; stroke-dasharray: 5 4;
stroke-linecap: round; pointer-events: none;
opacity: 0.7; display: none;
}

/* ── NOTE ── */
.note {
position: absolute;
width: 220px;
min-width: 180px;
background: rgba(250,247,243,0.78);
border: 1px solid rgba(210,185,165,0.55);
border-radius: 16px;
box-shadow: 0 4px 24px rgba(80,45,15,0.10), 0 1px 4px rgba(80,45,15,0.06), inset 0 1px 0 rgba(255,255,255,0.9);
backdrop-filter: blur(18px) saturate(1.5);
-webkit-backdrop-filter: blur(18px) saturate(1.5);
transition: box-shadow 0.2s, transform 0.12s;
user-select: none;
touch-action: none;
display: flex;
flex-direction: column;
overflow: hidden;
}

/* During pinch zoom — disable GPU-heavy effects to prevent WebKit crash */
body.is-zooming .note {
backdrop-filter: none !important;
-webkit-backdrop-filter: none !important;
will-change: auto !important;
}
body.is-zooming #toolbar {
backdrop-filter: none !important;
-webkit-backdrop-filter: none !important;
}
body.is-zooming #boards-panel,
body.is-zooming #settings-box {
backdrop-filter: none !important;
-webkit-backdrop-filter: none !important;
}
body.is-zooming .c-line {
animation: none !important;
}
.note.drag {
box-shadow: 0 12px 40px rgba(80,45,15,0.14), 0 2px 8px rgba(80,45,15,0.07);
transform: scale(1.03) rotate(-0.8deg);
z-index: 500 !important;
transition: box-shadow 0.1s;
}
/* When note has explicit height, inner body scrolls */
.note .n-body {
flex: 1;
overflow: hidden;
min-height: 20px;
display: flex;
flex-direction: column;
}
.note.sel { box-shadow: 0 0 0 2.5px #eda06a, 0 12px 40px rgba(80,45,15,0.14), 0 2px 8px rgba(80,45,15,0.07); }

.n-head {
flex-shrink: 0;
display: flex; align-items: center; gap: 6px;
padding: 14px 12px 6px;
cursor: grab;
min-height: 44px;
}
.n-head:active { cursor: grabbing; }

.n-dot { width: 7px; height: 7px; border-radius: 50%; background: #eda06a; flex-shrink: 0; }

.n-title {
flex: 1; font-family: ‘Fraunces’, Georgia, ‘Times New Roman’, serif;
font-size: 13px; font-weight: 400; color: #26201a;
background: none; border: none; outline: none;
width: 100%; user-select: text; cursor: text;
min-width: 0;
}
.n-title::placeholder { color: #b09a88; }

.n-img-btn {
width: 28px; height: 28px; flex-shrink: 0;
display: flex; align-items: center; justify-content: center;
background: none; border: none; border-radius: 8px;
color: #b09a88; cursor: pointer;
transition: background 0.15s, color 0.15s;
touch-action: manipulation;
}
.n-img-btn:active { background: #f0e8df; color: #26201a; }
.n-img-btn svg { width: 13px; height: 13px; }

.n-body { padding: 6px 10px 8px; }

.n-text {
font-size: 12.5px; line-height: 1.55; color: #7a604e;
background: none; border: none; outline: none;
resize: none; width: 100%;
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Arial, sans-serif;
user-select: text; cursor: text; min-height: 46px;
}
.n-text::placeholder { color: #b09a88; }

.n-media { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; overflow: hidden; }
.n-media-item {
position: relative; border-radius: 10px; overflow: hidden;
background: #f0e8df;
}
.n-media-item img, .n-media-item video {
width: 100%; display: block;
height: auto; max-height: none;
object-fit: contain;
border-radius: 10px;
}
.n-media-rm {
position: absolute; top: 4px; right: 4px;
width: 20px; height: 20px;
background: rgba(255,255,255,0.88); border: none; border-radius: 50%;
font-size: 10px; cursor: pointer; color: #7a604e;
display: flex; align-items: center; justify-content: center;
}

.n-foot {
flex-shrink: 0;
display: flex; align-items: center; flex-wrap: wrap; gap: 4px;
padding: 5px 10px 9px;
margin-top: auto;
}
.n-tag {
font-size: 10.5px; padding: 2px 7px;
background: #fce8d8; color: #e07a3a;
border-radius: 999px; font-weight: 500;
border: none; cursor: pointer; font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, ‘Segoe UI’, Arial, sans-serif;
touch-action: manipulation;
}
.n-tag.add { background: #f0e8df; color: #b09a88; }

/* Connect dots - shown only in connect mode */
.cdot { display: none; }
.connect-mode .cdot {
display: block;
position: absolute;
width: 12px; height: 12px;
background: #e07a3a; border: 2px solid white;
border-radius: 50%;
z-index: 10;
box-shadow: 0 1px 4px rgba(80,40,10,0.2);
touch-action: manipulation; cursor: pointer;
}
.cdot.t { top: -6px;    left: 50%; margin-left: -6px; }
.cdot.b { bottom: -6px; left: 50%; margin-left: -6px; }
.cdot.l { left: -6px;   top: 50%;  margin-top: -6px; }
.cdot.r { right: -6px;  top: 50%;  margin-top: -6px; }

/* ── FAB (boards button) ── */
#fab {
position: fixed;
left: 20px;
bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
width: 66px; height: 66px;
border-radius: 50%;
background: none;
background-color: transparent;
border: none; cursor: pointer;
box-shadow: none;
display: flex; align-items: center; justify-content: center;
z-index: 800;
transition: transform 0.18s, opacity 0.18s;
touch-action: manipulation;
overflow: hidden;
padding: 0;
}
#fab:active { transform: scale(0.92); opacity: 0.85; }
#fab img {
width: 66px; height: 66px;
object-fit: cover;
border-radius: 50%;
display: block;
box-shadow: 0 4px 20px rgba(224,122,58,0.45), 0 1px 4px rgba(80,40,10,0.1);
}

/* ── BOARDS PANEL ── */
/* ── BOARDS PANEL – working style ── */
#boards-panel {
position: fixed;
left: 12px;
bottom: calc(env(safe-area-inset-bottom, 0px) + 92px);
width: min(260px, calc(100vw - 24px));
background: rgba(255,253,250,0.88);
border: 1.5px solid rgba(224,122,58,0.22);
border-radius: 28px;
backdrop-filter: blur(40px) saturate(1.8) brightness(1.05);
-webkit-backdrop-filter: blur(40px) saturate(1.8) brightness(1.05);
box-shadow: 0 20px 60px rgba(80,40,10,0.18), 0 2px 8px rgba(80,40,10,0.08);
z-index: 850;
overflow: hidden;
display: none;
animation: panelIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes panelIn {
from { opacity: 0; transform: translateY(14px) scale(0.94); }
to   { opacity: 1; transform: translateY(0) scale(1); }
}
#boards-panel.open { display: block; }

#boards-list {
padding: 12px 10px 8px;
max-height: 380px;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
}

.board-item {
display: flex; align-items: center; gap: 14px;
padding: 13px 14px;
border-radius: 999px;
cursor: pointer;
transition: background 0.14s;
touch-action: manipulation;
margin-bottom: 2px;
}
.board-item:active { background: #f0e8df; }
.board-item.active { background: #fce8d8; }

.board-circle {
width: 36px; height: 36px; border-radius: 50%;
flex-shrink: 0; display: flex; align-items: center; justify-content: center;
font-family: ‘Fraunces’, Georgia, serif;
font-size: 15px; font-weight: 400;
transition: border 0.2s;
}
.board-circle.active-c {
border: 2.5px solid #e07a3a;
background: rgba(224,122,58,0.12);
color: #e07a3a;
}
.board-circle:not(.active-c) {
background: rgba(100,70,40,0.10);
color: #7a604e;
}

.board-name {
font-size: 17px; font-weight: 400;
color: #26201a; flex: 1;
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, sans-serif;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
letter-spacing: -0.2px;
}
.board-item.active .board-name { font-weight: 500; color: #e07a3a; }

.board-del {
width: 26px; height: 26px; flex-shrink: 0;
background: none; border: none; border-radius: 50%;
color: #b09a88; font-size: 14px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
touch-action: manipulation;
opacity: 0; transition: opacity 0.15s;
}
.board-item:hover .board-del,
.board-item:focus-within .board-del { opacity: 1; }

#boards-footer {
padding: 12px 14px 14px;
}
#btn-new-board {
width: 100%;
display: flex; align-items: center; justify-content: center; gap: 8px;
padding: 12px;
background: rgba(255,252,248,0.6);
border: none;
border-radius: 999px;
font-size: 14px; font-weight: 400; color: #7a604e;
cursor: pointer; font-family: ‘DM Sans’, -apple-system, sans-serif;
transition: background 0.15s, box-shadow 0.15s;
touch-action: manipulation;
backdrop-filter: blur(12px) saturate(1.4);
-webkit-backdrop-filter: blur(12px) saturate(1.4);
box-shadow: 0 2px 8px rgba(80,45,15,0.08);
}
#btn-new-board:active { background: rgba(240,232,223,0.8); box-shadow: inset 0 1px 4px rgba(80,45,15,0.1); }
#btn-new-board svg { width: 15px; height: 15px; }

/* Toast */
#toast {
position: fixed; bottom: calc(env(safe-area-inset-bottom,0px) + 110px);
left: 50%; transform: translateX(-50%);
background: rgba(38,32,26,0.82);
color: white; font-size: 13px;
padding: 8px 16px; border-radius: 999px;
opacity: 0; transition: opacity 0.25s;
pointer-events: none; z-index: 9999;
white-space: nowrap;
backdrop-filter: blur(12px);
}
#toast.show { opacity: 1; }

#file-input { display: none; }

#tb-search-wrap:focus-within {
background: #f0e8df;
}
#tb-search-icon {
width: 13px; height: 13px; flex-shrink: 0;
color: #b09a88;
transition: color 0.15s;
}
#tb-search-wrap:focus-within #tb-search-icon { color: #e07a3a; }
#tb-search {
border: none; outline: none; background: transparent;
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, sans-serif;
font-size: 13px; font-weight: 400; color: #26201a;
width: 100%; min-width: 40px;
}
#tb-search::placeholder { color: #b09a88; }
#tb-search-clear {
display: none;
background: none; border: none; cursor: pointer;
font-size: 10px; color: #b09a88; padding: 0;
width: 14px; height: 14px; flex-shrink: 0;
border-radius: 50%;
align-items: center; justify-content: center;
touch-action: manipulation;
}
#tb-search-clear.visible { display: flex; }
#tb-search-clear:active { background: #e5d5c5; }

/* search highlight on notes */
.note.search-match {
box-shadow: 0 0 0 2.5px #e07a3a, 0 4px 24px rgba(80,45,15,0.15) !important;
}
.note.search-hidden {
display: none !important;
}

/* ── NOTE PAGE EDITOR ── */
#note-editor-overlay {
display: none;
position: fixed;
inset: 0;
z-index: 3000;
background: var(–bg, #f7f4f0);
flex-direction: column;
}
#note-editor-overlay.open {
display: flex;
animation: editorSlideIn 0.28s cubic-bezier(0.34,1.1,0.64,1);
}
@keyframes editorSlideIn {
from { opacity: 0; transform: translateY(22px) scale(0.98); }
to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Editor top bar */
#ne-topbar {
flex-shrink: 0;
display: flex;
align-items: center;
gap: 6px;
padding: max(env(safe-area-inset-top),14px) 14px 10px;
border-bottom: 1px solid var(–warm-200, #e5d5c5);
background: rgba(247,244,240,0.92);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
}
#ne-back {
display: flex; align-items: center; gap: 6px;
background: none; border: none; cursor: pointer;
font-family: ‘DM Sans’, -apple-system, sans-serif;
font-size: 14px; font-weight: 400; color: #e07a3a;
padding: 8px 10px 8px 6px; border-radius: 10px;
touch-action: manipulation;
transition: background 0.15s;
}
#ne-back:active { background: #fce8d8; }
#ne-back svg { width: 18px; height: 18px; }

#ne-title-label {
flex: 1; text-align: center;
font-family: ‘Fraunces’, Georgia, serif;
font-size: 15px; font-weight: 400; color: #26201a;
overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

#ne-img-btn {
display: flex; align-items: center; justify-content: center;
background: none; border: none; cursor: pointer;
width: 36px; height: 36px; border-radius: 10px;
color: #b09a88; touch-action: manipulation;
transition: background 0.15s, color 0.15s;
}
#ne-img-btn:active { background: #f0e8df; color: #26201a; }
#ne-img-btn svg { width: 17px; height: 17px; }

/* Formatting toolbar */
#ne-fmt-bar {
flex-shrink: 0;
display: flex;
align-items: center;
gap: 1px;
padding: 6px 10px;
background: rgba(250,247,243,0.9);
border-bottom: 1px solid var(–warm-200, #e5d5c5);
overflow-x: auto;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
#ne-fmt-bar::-webkit-scrollbar { display: none; }

.fmt-btn {
display: flex; align-items: center; justify-content: center;
min-width: 34px; height: 34px; padding: 0 6px;
background: none; border: none; border-radius: 8px;
font-family: ‘DM Sans’, -apple-system, sans-serif;
font-size: 13px; font-weight: 500; color: #7a604e;
cursor: pointer; touch-action: manipulation;
transition: background 0.12s, color 0.12s;
flex-shrink: 0;
}
.fmt-btn:active, .fmt-btn.active { background: #fce8d8; color: #e07a3a; }
.fmt-btn svg { width: 15px; height: 15px; }
.fmt-sep {
width: 1px; height: 20px; background: #e5d5c5; margin: 0 3px; flex-shrink: 0;
}

/* Editor content area */
#ne-content {
flex: 1;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
display: flex;
flex-direction: column;
}

#ne-editor {
flex: 1;
min-height: 100%;
padding: 18px 18px calc(env(safe-area-inset-bottom,0px) + 80px);
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
font-size: 15px; line-height: 1.7; color: #26201a;
background: transparent;
border: none; outline: none; resize: none;
width: 100%; box-sizing: border-box;
}
#ne-editor::placeholder { color: #b09a88; }

/* Preview mode */
#ne-preview {
flex: 1;
padding: 18px 18px calc(env(safe-area-inset-bottom,0px) + 80px);
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
font-size: 15px; line-height: 1.7; color: #26201a;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
display: none;
}
#ne-preview h1 { font-family: ‘Fraunces’, Georgia, serif; font-size: 1.7rem; font-weight: 400; margin: 1.2rem 0 0.5rem; color: #26201a; }
#ne-preview h2 { font-family: ‘Fraunces’, Georgia, serif; font-size: 1.3rem; font-weight: 400; margin: 1rem 0 0.4rem; color: #26201a; }
#ne-preview h3 { font-size: 1.05rem; font-weight: 600; margin: 0.9rem 0 0.3rem; color: #26201a; }
#ne-preview strong { font-weight: 600; }
#ne-preview em { font-style: italic; }
#ne-preview u { text-decoration: underline; }
#ne-preview s { text-decoration: line-through; opacity: 0.6; }
#ne-preview a { color: #e07a3a; text-decoration: underline; }
#ne-preview code { background: #f0e8df; border: 1px solid #e5d5c5; padding: 1px 6px; border-radius: 5px; font-family: monospace; font-size: 0.87em; }
#ne-preview pre { background: #f0e8df; border: 1px solid #e5d5c5; border-radius: 10px; padding: 12px 14px; overflow-x: auto; font-family: monospace; font-size: 0.87em; margin: 0.8rem 0; }
#ne-preview pre code { background: none; border: none; padding: 0; }
#ne-preview blockquote { border-left: 3px solid #e07a3a; margin: 0.8rem 0; padding: 4px 14px; color: #7a604e; font-style: italic; }
#ne-preview ul, #ne-preview ol { margin: 0.5rem 0 0.5rem 1.4rem; }
#ne-preview li { margin: 3px 0; }
#ne-preview hr { border: none; border-top: 1px solid #e5d5c5; margin: 1.2rem 0; }
#ne-preview table { border-collapse: collapse; width: 100%; margin: 0.8rem 0; font-size: 0.92em; }
#ne-preview th { background: #fce8d8; font-weight: 600; text-align: left; }
#ne-preview th, #ne-preview td { border: 1px solid #e5d5c5; padding: 7px 10px; }
#ne-preview tr:nth-child(even) td { background: rgba(240,232,223,0.4); }
#ne-preview img { max-width: 100%; border-radius: 10px; margin: 6px 0; display: block; }
#ne-preview .task-item { display: flex; align-items: flex-start; gap: 8px; margin: 4px 0; }
#ne-preview .task-cb { width: 17px; height: 17px; border-radius: 4px; flex-shrink: 0; margin-top: 3px; }
#ne-preview .task-cb.done { background: #e07a3a; border: none; display: flex; align-items: center; justify-content: center; }
#ne-preview .task-cb.todo { border: 2px solid #d4bea8; }
#ne-preview .task-done-text { text-decoration: line-through; opacity: 0.55; }

/* Word count badge */
#ne-wordcount {
position: fixed;
bottom: calc(env(safe-area-inset-bottom,0px) + 16px);
right: 16px;
background: rgba(38,32,26,0.55);
color: rgba(255,255,255,0.9);
font-size: 11px; font-family: ‘DM Sans’, -apple-system, sans-serif;
padding: 4px 10px; border-radius: 999px;
pointer-events: none;
backdrop-filter: blur(10px);
z-index: 3100;
display: none;
}
#note-editor-overlay.open ~ #ne-wordcount { display: block; }

/* Page images inside editor */
.ne-page-img-wrap {
position: relative; margin: 8px 0; border-radius: 10px; overflow: hidden;
background: #f0e8df;
}
.ne-page-img-wrap img { max-width: 100%; display: block; border-radius: 10px; }
.ne-page-img-rm {
position: absolute; top: 6px; right: 6px;
width: 24px; height: 24px;
background: rgba(255,255,255,0.88); border: none; border-radius: 50%;
font-size: 11px; cursor: pointer; color: #7a604e;
display: flex; align-items: center; justify-content: center;
touch-action: manipulation;
}

/* Note “open page” hint indicator */
.note-page-indicator {
position: absolute;
bottom: 7px; right: 10px;
font-size: 10px; color: #b09a88;
display: flex; align-items: center; gap: 3px;
pointer-events: none;
font-family: ‘DM Sans’, -apple-system, sans-serif;
}
.note-page-indicator svg { width: 10px; height: 10px; }

/* ── RESIZE HANDLE (connect mode only) ── */
.note-resize {
display: none;
position: absolute;
bottom: 0; right: 0;
width: 48px; height: 48px;
background: transparent;
border: none;
border-radius: 0 0 16px 0;
z-index: 30;
cursor: se-resize;
touch-action: none;
}
.note-resize::after {
content: ‘’;
position: absolute;
bottom: 7px; right: 7px;
width: 16px; height: 16px;
background: #e07a3a;
border: 2.5px solid white;
border-radius: 50%;
box-shadow: 0 2px 8px rgba(80,40,10,0.35), 0 0 0 1px rgba(224,122,58,0.3);
transition: transform 0.12s, box-shadow 0.12s;
pointer-events: none;
}
.connect-mode .note-resize:hover::after {
transform: scale(1.3);
}
.connect-mode .note-resize {
display: block;
}
/* text-node with connect-mode class directly */
.text-node.connect-mode .note-resize {
display: block;
}
.text-node.connect-mode .connect-mode .note-resize:hover {
transform: scale(1.25);
box-shadow: 0 3px 12px rgba(224,122,58,0.5), 0 0 0 2px rgba(224,122,58,0.25);
}
.connect-mode .note-resize:active {
transform: scale(1.15);
}

/* ── MODAL ── */
#modal-overlay {
display: none;
position: fixed;
inset: 0;
z-index: 2000;
background: rgba(38,32,26,0.45);
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(8px);
align-items: center;
justify-content: center;
}
#modal-overlay.open {
display: flex;
}
#modal-box {
background: #faf7f3;
border-radius: 20px;
padding: 24px 20px 20px;
width: min(300px, calc(100vw - 40px));
box-shadow: 0 20px 60px rgba(80,40,10,0.22), 0 2px 8px rgba(80,40,10,0.1);
display: flex;
flex-direction: column;
gap: 14px;
}
#modal-box h3 {
font-family: ‘Fraunces’, Georgia, serif;
font-size: 18px; font-weight: 400;
color: #26201a; margin: 0;
}
#modal-input {
border: 1.5px solid rgba(210,185,165,0.7);
border-radius: 12px;
padding: 10px 12px;
font-size: 15px;
font-family: ‘DM Sans’, -apple-system, sans-serif;
color: #26201a;
background: white;
outline: none;
width: 100%;
box-sizing: border-box;
}
#modal-input:focus {
border-color: #e07a3a;
}
.modal-btns {
display: flex;
gap: 10px;
justify-content: flex-end;
}
.modal-btn {
padding: 9px 20px;
border-radius: 999px;
border: none;
font-size: 14px;
font-family: ‘DM Sans’, -apple-system, sans-serif;
cursor: pointer;
touch-action: manipulation;
}
.modal-btn.cancel {
background: #f0e8df;
color: #7a604e;
}
.modal-btn.create {
background: #e07a3a;
color: white;
}
.modal-btn.cancel:active { background: #e5d5c5; }
.modal-btn.create:active { background: #c85e1a; }

/* delete button replaced by 3-dot menu */

/* Hide media upload button in connect mode */
.connect-mode .n-img-btn {
display: none !important;
}

/* ── SETTINGS PANEL ── */
#settings-panel {
display: none;
position: fixed;
inset: 0;
z-index: 10000;
align-items: flex-end;
justify-content: flex-start;
padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 100px);
padding-left: 12px;
isolation: isolate;
background: transparent;
}
/* Block all canvas elements from showing over settings panel */
#settings-panel.open ~ * .note-menu-btn,
#settings-panel.open ~ * .note-resize {
visibility: hidden !important;
}
#settings-panel.open { display: flex; }

#settings-box {
background: rgba(250,247,243,0.98);
backdrop-filter: blur(40px) saturate(1.8);
-webkit-backdrop-filter: blur(40px) saturate(1.8);
border: 1px solid rgba(210,185,165,0.45);
border-radius: 24px;
box-shadow: 0 16px 48px rgba(80,40,10,0.18), inset 0 1px 0 rgba(255,255,255,0.9);
padding: 16px;
width: 220px;
animation: panelPop 0.3s cubic-bezier(0.34,1.4,0.64,1) both;
isolation: isolate;
overflow: hidden;
position: relative;
display: flex;
flex-direction: column;
gap: 0;
}

#settings-header {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 14px;
}
#settings-title {
font-family: ‘Fraunces’, Georgia, serif;
font-size: 16px; color: #26201a;
}
#settings-close {
background: none; border: none; cursor: pointer;
font-size: 13px; color: #b09a88; padding: 2px 6px;
border-radius: 999px; touch-action: manipulation;
}
#settings-close:active { background: #f0e8df; }

#settings-colors {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 10px;
margin-bottom: 14px;
}
.bg-swatch {
width: 100%; aspect-ratio: 1;
border-radius: 50%;
border: 2px solid rgba(0,0,0,0.08);
cursor: pointer;
touch-action: manipulation;
transition: transform 0.12s, box-shadow 0.12s;
position: relative;
}
.bg-swatch:active { transform: scale(0.9); }
.bg-swatch.active {
box-shadow: 0 0 0 3px #e07a3a;
border-color: transparent;
}

#settings-custom {
display: flex; align-items: center; justify-content: space-between;
padding: 10px 12px;
background: rgba(255,255,255,0.5);
border-radius: 14px;
border: 1px solid rgba(210,185,165,0.4);
}
#settings-custom span {
font-size: 13px; color: #7a604e;
font-family: ‘DM Sans’, sans-serif;
}
#bg-color-picker {
width: 32px; height: 32px;
border: none; border-radius: 50%;
cursor: pointer; padding: 0;
background: none;
outline: none;
}

/* ── SPLASH SCREEN ── */
#splash {
position: fixed;
inset: 0;
z-index: 99999;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 20px;
background-color: #f7f4f0;
background-image: radial-gradient(circle, rgba(140,100,60,0.12) 1.3px, transparent 1.3px);
background-size: 26px 26px;
transition: opacity 0.5s ease, transform 0.5s ease;
}
#splash.hide {
opacity: 0;
transform: scale(1.04);
pointer-events: none;
}
#splash-icon {
width: min(85vw, 420px);
height: auto;
border-radius: 0;
object-fit: contain;
animation: splashPop 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
#splash-name {
font-family: ‘Fraunces’, Georgia, serif;
font-size: 28px;
font-weight: 300;
color: #26201a;
letter-spacing: -0.5px;
animation: splashFade 0.7s 0.15s ease both;
}
@keyframes splashPop {
from { opacity: 0; transform: scale(0.7); }
to   { opacity: 1; transform: scale(1); }
}
@keyframes splashFade {
from { opacity: 0; transform: translateY(8px); }
to   { opacity: 1; transform: translateY(0); }
}

/* ── NOTE 3-DOT MENU ── */
.note-menu-btn {
display: none;
position: absolute;
top: 5px; right: 5px;
width: 24px; height: 24px;
background: rgba(255,255,255,0.7);
border: none;
border-radius: 50%;
z-index: 30;
cursor: pointer;
touch-action: manipulation;
align-items: center; justify-content: center;
box-shadow: 0 1px 4px rgba(80,40,10,0.15);
transition: transform 0.12s, background 0.12s;
padding: 0;
}
.connect-mode .note-menu-btn { display: flex; }
.note-menu-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.95); }

/* Context menu popup */
.note-ctx-menu {
position: fixed;
z-index: 9000;
pointer-events: all;
background: rgba(250,247,243,0.85);
backdrop-filter: blur(32px) saturate(1.8);
-webkit-backdrop-filter: blur(32px) saturate(1.8);
border: 1px solid rgba(210,185,165,0.45);
border-radius: 18px;
box-shadow: 0 16px 48px rgba(80,40,10,0.2), 0 2px 8px rgba(80,40,10,0.08);
min-width: 200px;
overflow: hidden;
animation: ctxIn 0.18s cubic-bezier(0.34,1.56,0.64,1);
transform-origin: top right;
}
@keyframes ctxIn {
from { opacity: 0; transform: scale(0.85); }
to   { opacity: 1; transform: scale(1); }
}

.ctx-item {
display: flex; align-items: center; gap: 12px;
padding: 13px 16px;
cursor: pointer;
touch-action: manipulation;
font-family: ‘DM Sans’, -apple-system, sans-serif;
font-size: 14px; color: #26201a;
transition: background 0.12s;
border: none; background: none; width: 100%; text-align: left;
}
.ctx-item:active { background: rgba(224,122,58,0.08); }
.ctx-item.danger { color: #d94f3a; }
.ctx-item.danger:active { background: rgba(217,79,58,0.08); }
.ctx-item svg { flex-shrink: 0; opacity: 0.7; }
.ctx-item.danger svg { opacity: 1; }

.ctx-sep {
height: 1px;
background: rgba(210,185,165,0.35);
margin: 0 12px;
}

/* Color picker row inside menu */
.ctx-colors {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 6px;
padding: 6px 14px 8px;
}
.ctx-color-dot {
width: 22px; height: 22px;
border-radius: 50%;
border: 2px solid rgba(0,0,0,0.08);
cursor: pointer;
touch-action: manipulation;
transition: transform 0.12s, box-shadow 0.12s;
flex-shrink: 0;
}
.ctx-color-dot:active { transform: scale(0.85); }
.ctx-color-dot.active {
box-shadow: 0 0 0 3px white, 0 0 0 5px #e07a3a;
}
.ctx-color-label {
font-size: 11px; color: #b09a88;
font-family: ‘DM Sans’, sans-serif;
padding: 0 16px 0;
margin-top: -4px;
}

/* ── FREE TEXT NODE ── */
.text-node {
position: absolute;
min-width: 80px;
background: none;
border: none;
box-shadow: none;
touch-action: none;
user-select: none;
cursor: grab;
z-index: 10;
}
.text-node:active { cursor: grabbing; }
.text-node textarea { cursor: inherit; }

.text-node-input {
background: none;
border: none;
outline: none;
resize: none;
width: 100%;
min-width: 60px;
font-family: ‘Fraunces’, Georgia, ‘Times New Roman’, serif;
font-size: 20px;
font-weight: 300;
color: #26201a;
line-height: 1.35;
padding: 0;
min-height: 1.4em;
overflow: hidden;
cursor: text;
display: block;
}

/* 3-dot menu button on text node */
.text-node .note-menu-btn {
top: -12px;
right: -8px;
background: rgba(250,247,243,0.9);
}

/* Resize handle on text node */
.text-node .note-resize {
background: transparent;
}
.text-node .note-resize::after {
background: #7a604e;
}
.text-node.connect-source {
outline: 2.5px solid #eda06a;
border-radius: 4px;
}
.text-node.sel {
outline: 2.5px solid #eda06a;
border-radius: 4px;
}

/* ── NO TEXT SELECTION ANYWHERE ── */
html, body, * {
-webkit-user-select: none !important;
-moz-user-select: none !important;
user-select: none !important;
-webkit-touch-callout: none !important;
}
/* Only allow selection inside focused inputs/textareas */
input:focus, textarea:focus {
-webkit-user-select: text !important;
-moz-user-select: text !important;
user-select: text !important;
}

/* ── LOCK BOARD BUTTON ── */
#settings-lock-sep {
height: 1px;
background: rgba(210,185,165,0.35);
margin: 12px 0 10px;
}
#btn-lock-board {
width: 100%;
display: flex; align-items: center; justify-content: center; gap: 9px;
padding: 13px;
margin-top: 10px;
background: rgba(255,255,255,0.5);
border: 1px solid rgba(210,185,165,0.45);
border-radius: 14px;
font-size: 14px; font-weight: 500;
color: #26201a;
cursor: pointer;
font-family: ‘DM Sans’, -apple-system, sans-serif;
transition: background 0.15s, border-color 0.15s, color 0.15s;
touch-action: manipulation;
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(8px);
}
#btn-lock-board:active {
background: rgba(224,122,58,0.1);
}
#btn-lock-board.locked {
background: rgba(224,122,58,0.12);
border-color: rgba(224,122,58,0.5);
color: #e07a3a;
}

/* Hide note menu buttons when settings panel is open */
body.settings-open .note-menu-btn {
visibility: hidden !important;
}

#lock-icon-wrap {
display: flex;
align-items: center;
flex-shrink: 0;
}
#lock-icon-wrap svg {
display: block;
}

/* ── SPAWN (HOME ANCHOR) ── */
#spawn-marker {
position: absolute;
z-index: 50;
transform: translate(-50%, -100%);
cursor: grab;
display: none;
touch-action: none;
}
#spawn-marker:active { cursor: grabbing; opacity: 0.85; }
#spawn-marker svg {
display: block;
width: 36px; height: 36px;
}

/* Spawn button in toolbar */
#btn-spawn {
display: flex; align-items: center; gap: 5px;
padding: 7px 10px;
border-radius: 999px;
border: none; background: none;
font-size: 13px; font-weight: 400;
color: #7a604e;
cursor: pointer; touch-action: manipulation;
font-family: ‘DM Sans’, -apple-system, sans-serif;
transition: background 0.15s, color 0.15s;
white-space: nowrap;
}
#btn-spawn:active { background: rgba(224,122,58,0.1); }
#btn-spawn.active {
color: #e07a3a;
background: none;
}
#btn-spawn svg { flex-shrink: 0; }

.tb-sep { display: none !important; }

/* ── SPAWN DIRECTION ARROW ── */
#spawn-arrow {
position: fixed;
z-index: 999;
display: none;
width: 24px;
height: 24px;
align-items: center;
justify-content: center;
pointer-events: none;
transition: opacity 0.3s;
filter: drop-shadow(0 2px 4px rgba(224,122,58,0.4));
}
#spawn-arrow.visible { display: flex; }
#spawn-arrow svg { transition: transform 0.1s; }

/* ── STATUS BADGES ── */
.note-status {
display: flex;
align-items: center;
gap: 4px;
background: var(–status-bg, #f0e8df);
border: 1px solid var(–status-border, rgba(210,185,165,0.5));
border-radius: 999px;
padding: 3px 9px 3px 6px;
font-size: 11px;
font-family: ‘DM Sans’, -apple-system, sans-serif;
font-weight: 500;
color: var(–status-color, #7a604e);
white-space: nowrap;
margin: 6px 10px 0;
align-self: flex-start;
pointer-events: none;
flex-shrink: 0;
}
.note-status .status-dot {
width: 7px; height: 7px;
border-radius: 50%;
background: var(–status-dot, #b09a88);
flex-shrink: 0;
}

/* Status color themes */
.note[data-status=“urgent”]  { –status-bg: rgba(217,79,58,0.12); –status-border: rgba(217,79,58,0.35); –status-color: #d94f3a; –status-dot: #d94f3a; }
.note[data-status=“active”]  { –status-bg: rgba(91,170,106,0.12); –status-border: rgba(91,170,106,0.35); –status-color: #3a9a50; –status-dot: #5baa6a; }
.note[data-status=“done”]    { –status-bg: rgba(74,144,217,0.12); –status-border: rgba(74,144,217,0.35); –status-color: #3a80d9; –status-dot: #4a90d9; }
.note[data-status=“idea”]    { –status-bg: rgba(217,184,74,0.12); –status-border: rgba(217,184,74,0.3); –status-color: #b8920a; –status-dot: #d9b84a; }
.note[data-status=“blocked”] { –status-bg: rgba(155,109,217,0.12); –status-border: rgba(155,109,217,0.3); –status-color: #8855cc; –status-dot: #9b6dd9; }
.note[data-status=“note”]    { –status-bg: rgba(224,122,58,0.12); –status-border: rgba(224,122,58,0.3); –status-color: #e07a3a; –status-dot: #e07a3a; }

/* Status picker in ctx menu */
.ctx-status-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 5px;
padding: 6px 12px 8px;
}
.ctx-status-btn {
display: flex;
align-items: center;
gap: 5px;
padding: 7px 8px;
border-radius: 10px;
border: 1.5px solid transparent;
background: rgba(180,140,100,0.1);
cursor: pointer;
font-size: 11px;
font-family: ‘DM Sans’, sans-serif;
color: #7a604e;
touch-action: manipulation;
transition: background 0.12s, border-color 0.12s;
white-space: nowrap;
}
.ctx-status-btn:active { opacity: 0.7; }
.ctx-status-btn.active {
border-color: currentColor;
background: rgba(0,0,0,0.05);
}
.ctx-status-btn .s-dot {
width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

/* ── MINIMAP ── */
#minimap {
position: fixed;
bottom: calc(env(safe-area-inset-bottom, 0px) + 180px);
right: 12px;
left: auto;
width: min(calc(100vw - 40px), 300px);
height: min(40vh, 220px);
border-radius: 18px;
background: rgba(250,247,243,0.92);
border: 1px solid rgba(210,185,165,0.35);
backdrop-filter: blur(24px) saturate(1.4);
-webkit-backdrop-filter: blur(24px) saturate(1.4);
box-shadow: 0 8px 32px rgba(80,45,15,0.12), 0 2px 8px rgba(80,45,15,0.06);
z-index: 700;
overflow: hidden;
cursor: pointer;
transition: opacity 0.2s;
animation: panelPop 0.3s cubic-bezier(0.34,1.4,0.64,1) both;
}
#minimap:active { opacity: 0.85; }

/* Minimap SVG layer */
#minimap-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }

/* Viewport indicator - glowing outline only */
#minimap-viewport {
position: absolute;
border: 1.5px solid rgba(224,122,58,0.8);
background: rgba(224,122,58,0.06);
border-radius: 4px;
pointer-events: none;
box-shadow: 0 0 8px rgba(224,122,58,0.3), inset 0 0 4px rgba(224,122,58,0.1);
}

body.dark-bg #minimap {
background: rgba(12,10,8,0.88) !important;
border-color: rgba(255,255,255,0.07) !important;
box-shadow: 0 16px 48px rgba(0,0,0,0.4) !important;
}

/* Viewport indicator on minimap */
#minimap-viewport {
position: absolute;
border: 1px solid rgba(224,122,58,0.4);
background: rgba(224,122,58,0.05);
border-radius: 4px;
pointer-events: none;
box-shadow: inset 0 0 0 0.5px rgba(255,255,255,0.3);
}

/* Note dots on minimap */
.mm-note {
position: absolute;
border-radius: 2px;
background: rgba(224,122,58,0.5);
pointer-events: none;
}
.mm-note[data-status=“urgent”]  { background: rgba(217,79,58,0.7); }
.mm-note[data-status=“active”]  { background: rgba(91,170,106,0.7); }
.mm-note[data-status=“done”]    { background: rgba(74,144,217,0.7); }
.mm-note[data-status=“idea”]    { background: rgba(217,184,74,0.7); }
.mm-note[data-status=“blocked”] { background: rgba(155,109,217,0.7); }

/* Minimap toggle button - bottom right, larger */
#btn-minimap {
width: 50px; height: 50px;
border-radius: 50%;
background: rgba(250,247,243,0.88);
border: 1px solid rgba(210,185,165,0.5);
backdrop-filter: blur(20px) saturate(1.5);
-webkit-backdrop-filter: blur(20px) saturate(1.5);
box-shadow: 0 4px 16px rgba(80,45,15,0.14), inset 0 1px 0 rgba(255,255,255,0.8);
display: flex; align-items: center; justify-content: center;
cursor: pointer; z-index: 701;
touch-action: manipulation;
transition: transform 0.15s, box-shadow 0.15s;
flex-shrink: 0;
}
#btn-minimap:active { transform: scale(0.9); }
#btn-minimap svg { color: #7a604e; width: 18px; height: 18px; }
#btn-minimap.active svg { color: #e07a3a; }
#btn-minimap.active {
background: rgba(224,122,58,0.08);
border-color: rgba(224,122,58,0.35);
}

/* Connection lines on minimap */
#minimap-svg {
position: absolute;
inset: 0;
width: 100%; height: 100%;
pointer-events: none;
overflow: visible;
}

/* ── NOTE SKINS ── */
/* Default */
.note { }

/* Solid color skins */
.note[data-skin=“warm”]    { background: #fff8f0 !important; border-color: rgba(224,122,58,0.3) !important; }
.note[data-skin=“cool”]    { background: #f0f4ff !important; border-color: rgba(74,144,217,0.3) !important; }
.note[data-skin=“sage”]    { background: #f0f7f0 !important; border-color: rgba(91,170,106,0.3) !important; }
.note[data-skin=“rose”]    { background: #fff0f4 !important; border-color: rgba(217,79,120,0.3) !important; }
.note[data-skin=“lavender”]{ background: #f4f0ff !important; border-color: rgba(155,109,217,0.3) !important; }
.note[data-skin=“charcoal”]{ background: #f4f0ff !important; }

/* ── SPACE MARKERS ── */
.space-marker {

transform: translate(-50%, -50%);

touch-action: none;
font-size: 28px;
line-height: 1;
user-select: none;

}
.space-marker:active { cursor: grabbing; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4)) scale(1.1); }

/* Markers panel */
#markers-panel {

padding: 10px 20px;
overflow: visible;
display: none;
align-items: center;
gap: 16px;
z-index: 850;
animation: markersIn 0.28s cubic-bezier(0.34,1.56,0.64,1) both;
}
#markers-panel.open { display: flex; }

border: none;

.marker-pick-btn:active { transform: scale(0.82); background: rgba(0,0,0,0.06); }

@keyframes markersIn {
0%   { opacity: 0; transform: translateX(-50%) translateY(16px) scale(0.85); }
100% { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1); }
}

/* ══════════════════════════════════════════════
ANIMATIONS
══════════════════════════════════════════════ */

/* 1. Note appear — springy pop */
@keyframes noteAppear {
0%   { opacity: 0; transform: scale(0.5) translateY(10px); }
60%  { opacity: 1; transform: scale(1.06) translateY(-3px); }
80%  { transform: scale(0.97) translateY(1px); }
100% { opacity: 1; transform: scale(1) translateY(0); }
}
.note-spawn {
animation: noteAppear 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

/* 2. Note delete — particle disintegration */
.dust-particle {
position: fixed;
border-radius: 50%;
pointer-events: none;
z-index: 99999;
}

/* 3. Drag — lifted shadow */
.note.dragging {
transition: box-shadow 0.15s, transform 0.1s !important;
box-shadow: 0 20px 60px rgba(80,45,15,0.22), 0 6px 16px rgba(80,45,15,0.14) !important;
transform-origin: center center;
z-index: 9999 !important;
}

/* 4. Button press micro-animation */
.tb-btn:active,
#btn-spawn:active,
#btn-settings:active {
transform: scale(0.88) !important;
transition: transform 0.08s !important;
}
.ur-btn:active {
transform: scale(0.84) !important;
}
#btn-minimap:active {
transform: scale(0.88) !important;
}

/* 5. Board switch — fade transition */
@keyframes boardFadeIn {
0%   { opacity: 0; transform: scale(0.97) translateY(8px); }
100% { opacity: 1; transform: scale(1) translateY(0); }
}
.board-switching {
animation: boardFadeIn 0.3s cubic-bezier(0.34, 1.2, 0.64, 1) both;
}

/* 6. Panel open animations (improve existing) */
@keyframes panelPop {
0%   { opacity: 0; transform: translateY(12px) scale(0.94); }
65%  { transform: translateY(-3px) scale(1.01); }
100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* Text node appear */
@keyframes textNodeAppear {
0%   { opacity: 0; transform: scale(0.7); }
70%  { transform: scale(1.05); }
100% { opacity: 1; transform: scale(1); }
}
.text-node-spawn {
animation: textNodeAppear 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

/* Note lift on drag start */
@keyframes noteLift {
0%   { transform: scale(1) rotate(0deg); }
100% { transform: scale(1.03) rotate(1deg); }
}

.note[data-skin=“dark-blue”][data-status=“idea”],
.note[data-skin=“dark-green”][data-status=“idea”] { –status-color: #ffd060; –status-dot: #ffd060; }
.note[data-skin=“dark”][data-status=“blocked”],
.note[data-skin=“dark-blue”][data-status=“blocked”],
.note[data-skin=“dark-green”][data-status=“blocked”] { –status-color: #c090ff; –status-dot: #c090ff; }
.note[data-skin=“dark”][data-status=“note”],
.note[data-skin=“dark-blue”][data-status=“note”],
.note[data-skin=“dark-green”][data-status=“note”] { –status-color: #ffaa60; –status-dot: #ffaa60; }

/* + tag button on dark skins */
.note[data-skin=“dark”] .n-tag,
.note[data-skin=“dark-blue”] .n-tag,
.note[data-skin=“dark-green”] .n-tag {
background: rgba(255,255,255,0.08) !important;
color: rgba(255,255,255,0.5) !important;
border-color: rgba(255,255,255,0.1) !important;
}
.note[data-skin=“dark”] .n-tag.add,
.note[data-skin=“dark-blue”] .n-tag.add,
.note[data-skin=“dark-green”] .n-tag.add {
background: rgba(255,255,255,0.06) !important;
color: rgba(255,255,255,0.35) !important;
}

/* Note title and text on dark skins */
.note[data-skin=“dark”] .n-title,
.note[data-skin=“dark-blue”] .n-title,
.note[data-skin=“dark-green”] .n-title {
color: rgba(255,255,255,0.85) !important;
}
.note[data-skin=“dark”] .n-text,
.note[data-skin=“dark-blue”] .n-text,
.note[data-skin=“dark-green”] .n-text {
color: rgba(255,255,255,0.5) !important;
}
.note[data-skin=“dark”] .n-title::placeholder,
.note[data-skin=“dark-blue”] .n-title::placeholder,
.note[data-skin=“dark-green”] .n-title::placeholder { color: rgba(255,255,255,0.25) !important; }
.note[data-skin=“dark”] .n-text::placeholder,
.note[data-skin=“dark-blue”] .n-text::placeholder,
.note[data-skin=“dark-green”] .n-text::placeholder { color: rgba(255,255,255,0.2) !important; }

/* Dot color on dark skins */
.note[data-skin=“dark”] .n-dot,
.note[data-skin=“dark-blue”] .n-dot,
.note[data-skin=“dark-green”] .n-dot { opacity: 0.6; }

/* Resize dot on dark skins */
.note[data-skin=“dark”] .note-resize::after,
.note[data-skin=“dark-blue”] .note-resize::after,
.note[data-skin=“dark-green”] .note-resize::after { background: rgba(255,255,255,0.3) !important; }

/* DIRECT dark skin status badge override */
.note[data-skin=“dark”] .note-status,
.note[data-skin=“dark-blue”] .note-status,
.note[data-skin=“dark-green”] .note-status {
background: rgba(255,255,255,0.1) !important;
border-color: rgba(255,255,255,0.18) !important;
color: rgba(255,255,255,0.85) !important;
}
.note[data-skin=“dark”] .status-dot,
.note[data-skin=“dark-blue”] .status-dot,
.note[data-skin=“dark-green”] .status-dot {
filter: brightness(1.5) saturate(1.2);
}

/* Direct .n-tag fix on dark skins */
.note[data-skin=“dark”] .n-tag:not(.add),
.note[data-skin=“dark-blue”] .n-tag:not(.add),
.note[data-skin=“dark-green”] .n-tag:not(.add) {
background: rgba(255,255,255,0.1) !important;
color: rgba(255,255,255,0.7) !important;
border-color: rgba(255,255,255,0.15) !important;
}
.note[data-skin=“dark”] .n-tag.add,
.note[data-skin=“dark-blue”] .n-tag.add,
.note[data-skin=“dark-green”] .n-tag.add {
background: rgba(255,255,255,0.07) !important;
color: rgba(255,255,255,0.35) !important;
border-color: rgba(255,255,255,0.1) !important;
}
