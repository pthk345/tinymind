<script>
window.onerror = function(msg, src, line, col, err) {
  // Hide splash first
  var sp = document.getElementById('splash');
  if (sp) sp.style.display = 'none';
  // Show error
  var div = document.createElement('div');
  div.style.cssText = 'padding:16px;font-family:monospace;font-size:12px;color:#c00;background:#fff8f8;position:fixed;inset:0;z-index:99999;overflow:auto;word-break:break-all';
  div.innerHTML = '<b>JS Error (line ' + line + '):</b><br>' + msg + '<br><br>' + (err && err.stack ? err.stack.replace(/</g,'&lt;') : '');
  document.body.appendChild(div);
  return false;
};

// Always hide splash after 3s max, even if something crashes
setTimeout(function() {
  var sp = document.getElementById('splash');
  if (sp) { sp.style.opacity='0'; setTimeout(function(){if(sp.parentNode)sp.remove();},500); }
}, 2000);
// ─────────────────────────────────────────────────────────────────────────────
// STORAGE HELPERS
// ─────────────────────────────────────────────────────────────────────────────
// ── IndexedDB storage ────────────────────────────────────────────────────────
let db = null;
const DB_NAME = 'tiny-mind-db';
const DB_VERSION = 1;
const STORE = 'app-data';
const DATA_KEY = 'main';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(STORE);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

function saveBoards() {
  if (!historyPaused && typeof scheduleSnapshot === 'function') scheduleSnapshot();
  const data = { boards, activeBoardId };
  // Save to IndexedDB (primary)
  if (db) {
    try {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(data, DATA_KEY);
    } catch(e) {}
  }
  // Also save lightweight version (no media) to localStorage as quick-load cache
  try {
    const lite = {
      activeBoardId,
      boards: boards.map(b => ({
        ...b,
        notes: b.notes.map(n => ({ ...n, media: [] }))
      }))
    };
    localStorage.setItem('board-app-v3-lite', JSON.stringify(lite));
  } catch(e) {}
}

// Debounced save — prevents hammering IndexedDB during drag/resize
let _saveBoardsTimer = null;
function saveBoardsDebounced() {
  clearTimeout(_saveBoardsTimer);
  _saveBoardsTimer = setTimeout(saveBoards, 600);
}

// Pause / resume heavy background work during pinch zoom
function pauseHeavyWork() {
  // Stop wave animation rAF — main GPU hog during zoom
  if (typeof waveRaf !== 'undefined' && waveRaf) {
    cancelAnimationFrame(waveRaf);
    waveRaf = null;
  }
  document.body.classList.add('is-zooming');
  canvas.style.willChange = 'auto';
}

function resumeHeavyWork() {
  document.body.classList.remove('is-zooming');
  canvas.style.willChange = 'transform';
  // Restart wave animation
  if (typeof animateWaves === 'function' && !waveRaf) {
    animateWaves();
  }
  updateAllConnections();
  if (typeof updateSpawnArrow === 'function') updateSpawnArrow();
}

function loadBoards() {
  // Synchronous load from localStorage lite cache (for instant UI)
  try {
    const raw = localStorage.getItem('board-app-v3-lite') ||
                localStorage.getItem('board-app-v2');
    if (raw) {
      const d = JSON.parse(raw);
      boards = d.boards || [];
      activeBoardId = d.activeBoardId || null;
      return true;
    }
  } catch(e) {}
  return false;
}

async function loadBoardsFromDB() {
  // Load full data (with media) from IndexedDB after UI is shown
  try {
    db = await openDB();
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(DATA_KEY);
    return new Promise(resolve => {
      req.onsuccess = e => {
        const data = e.target.result;
        // If no IndexedDB data yet, try migrating from old localStorage
        if (!data) {
          try {
            const old = localStorage.getItem('board-app-v2');
            if (old) {
              const parsed = JSON.parse(old);
              if (parsed.boards) {
                const tx2 = db.transaction(STORE, 'readwrite');
                tx2.objectStore(STORE).put(parsed, DATA_KEY);
              }
            }
          } catch(e) {}
        }
        if (data && data.boards) {
          boards = data.boards;
          activeBoardId = data.activeBoardId || boards[0] ? boards[0].id : null;
          // Re-render current board with full media
          const board = currentBoard();
          if (board) {
            document.querySelectorAll('.note').forEach(el => el.remove());
            document.querySelectorAll('[id^="tn-"]').forEach(el => el.remove());
            document.querySelectorAll('.c-line').forEach(el => el.remove());
            board.notes.forEach(n => renderNote(n));
            if (board.textNodes) board.textNodes.forEach(t => renderTextNode(t));
            board.connections.forEach(c => renderConnection(c));
            updateAllConnections();
            if (typeof loadMarkersForBoard === 'function') loadMarkersForBoard();
          if (boardLocked) applyLockState();
          }
          renderBoardsList();
        }
        resolve(true);
      };
      req.onerror = () => resolve(false);
    });
  } catch(e) {
    return false;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let boards = [];          // [{id, name, notes:[], connections:[], vx, vy, vz}]
let activeBoardId = null;

let vx = 0, vy = 0, vz = 1;
const MIN_Z = 0.08, MAX_Z = 4;

let nextNoteId = 1;
let nextConnId = 1;

// Touch / pointer state
let pointers = {};        // id → {x,y}
let lastPinchDist = null;
let lastPinchMid  = null;

let isPanning = false;
let panStart  = null;
let _rafPending = false;

let isDragging = false, dragNoteId = null, dragOff = {x:0,y:0};
let connectMode = false, connectSrc = null;

let pendingMediaNoteId = null;

// ─────────────────────────────────────────────────────────────────────────────
// DOM
// ─────────────────────────────────────────────────────────────────────────────
const wrap        = document.getElementById('wrap');
const canvas      = document.getElementById('canvas');
const svgLayer    = document.getElementById('svg-layer');
const drawLine    = document.getElementById('draw-line');
const zoomLabel   = document.getElementById('zoom-label'); // may be null
const boardLabel  = document.getElementById('board-name-label'); // null - element removed
const btnConnect  = document.getElementById('btn-connect');
const boardsPanel = document.getElementById('boards-panel');
const boardsList  = document.getElementById('boards-list');
const fileInput   = document.getElementById('file-input');

// ─────────────────────────────────────────────────────────────────────────────
// BOARD MANAGEMENT
// ─────────────────────────────────────────────────────────────────────────────
function currentBoard() { return boards.find(b => b.id === activeBoardId); }

function createBoard(name) {
  const id = 'b' + Date.now();
  const board = { id, name, notes: [], connections: [], vx: 0, vy: 0, vz: 1 };
  boards.push(board);
  saveBoards();
  return board;
}

function switchBoard(id) {
  // Clear search when switching boards
  const _sq = document.getElementById('tb-search');
  if (_sq && _sq.value) {
    _sq.value = '';
    const _cl = document.getElementById('tb-search-clear');
    if (_cl) _cl.classList.remove('visible');
    // search-match/hidden classes will be cleared when notes re-render
  }
  // Save current viewport
  const cur = currentBoard();
  if (cur) { cur.vx = vx; cur.vy = vy; cur.vz = vz; }

  activeBoardId = id;
  const board = currentBoard();
  if (!board) return;

  // Clear canvas
  document.querySelectorAll('.note').forEach(e => e.remove());
  document.querySelectorAll('.c-line').forEach(e => e.remove());

  // Restore viewport - go to spawn if set, else saved viewport
  vx = board.vx || 0;
  vy = board.vy || 0;
  vz = board.vz || 1;
  applyTransform();
  // Navigate to spawn after render (use setTimeout to let notes render first)
  setTimeout(() => {
    const savedSpawn = localStorage.getItem('spawn-' + board.id);
    if (savedSpawn) {
      try {
        const { x, y } = JSON.parse(savedSpawn);
        const r = wrap.getBoundingClientRect();
        vx = r.width  / 2 - x * vz;
        vy = r.height / 2 - y * vz;
        applyTransform();
      } catch(e) {}
    } else if (board.notes && board.notes.length) {
      fitAll();
    }
  }, 80);

  // Restore notes
  board.notes.forEach(n => renderNote(n));

  // Restore text nodes
  if (board.textNodes) board.textNodes.forEach(t => renderTextNode(t));

  // Restore connections
  board.connections.forEach(c => renderConnection(c));

  if (boardLabel) boardLabel.textContent = board.name;
  saveBoards();
  renderBoardsList();
  if (boardLocked) applyLockState();
  // Reload spawn for new board
  spawnMarker.style.display = 'none';
  spawnActive = false;
  document.getElementById('btn-spawn').classList.remove('active');
  loadSpawn();
}

function deleteBoard(id) {
  if (boards.length <= 1) { showToast('Cannot delete last board'); return; }
  boards = boards.filter(b => b.id !== id);
  if (activeBoardId === id) {
    activeBoardId = boards[0].id;
    switchBoard(activeBoardId);
  }
  saveBoards();
  renderBoardsList();
}

// ─────────────────────────────────────────────────────────────────────────────
// BOARD PANEL UI
// ─────────────────────────────────────────────────────────────────────────────
const BOARD_COLORS = ['#e07a3a','#c0845a','#a87660','#8b6050','#d4946a','#bf8060','#e8a07a'];

function getBoardColor(idx) { return BOARD_COLORS[idx % BOARD_COLORS.length]; }

function renderBoardsList() {
  boardsList.innerHTML = '';
  boards.forEach((b, i) => {
    const isActive = b.id === activeBoardId;
    const item = document.createElement('div');
    item.className = 'board-item' + (isActive ? ' active' : '');

    const circle = document.createElement('div');
    circle.className = 'board-circle' + (isActive ? ' active-c' : '');
    circle.textContent = b.name.charAt(0).toUpperCase();

    const name = document.createElement('div');
    name.className = 'board-name';
    name.textContent = b.name;

    const del = document.createElement('button');
    del.className = 'board-del';
    del.innerHTML = '✕';
    del.title = 'Удалить';
    del.addEventListener('click', e => { e.stopPropagation(); deleteBoard(b.id); });

    item.appendChild(circle);
    item.appendChild(name);
    item.appendChild(del);
    item.addEventListener('click', () => {
      switchBoard(b.id);
      closeBoardsPanel();
    });
    boardsList.appendChild(item);
  });
}

function openBoardsPanel() {
  renderBoardsList();
  boardsPanel.classList.add('open');
}
function closeBoardsPanel() { boardsPanel.classList.remove('open'); }

document.getElementById('fab').addEventListener('click', e => {
  e.stopPropagation();
  boardsPanel.classList.contains('open') ? closeBoardsPanel() : openBoardsPanel();
});

document.getElementById('btn-new-board').addEventListener('click', () => {
  closeBoardsPanel();
  openModal();
});

document.addEventListener('click', e => {
  if (!boardsPanel.contains(e.target) && e.target.id !== 'fab') closeBoardsPanel();
});

// ─────────────────────────────────────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────────────────────────────────────
const modalOverlay = document.getElementById('modal-overlay');
const modalInput   = document.getElementById('modal-input');

function openModal() {
  modalInput.value = '';
  modalOverlay.classList.add('open');
  setTimeout(() => modalInput.focus(), 100);
}
function closeModal() { modalOverlay.classList.remove('open'); }

document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-create').addEventListener('click', () => {
  const name = modalInput.value.trim();
  if (!name) { modalInput.focus(); return; }
  const board = createBoard(name);
  switchBoard(board.id);
  closeModal();
  showToast('Board "' + name + '" created');
});
modalInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modal-create').click();
  if (e.key === 'Escape') closeModal();
});
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

// ─────────────────────────────────────────────────────────────────────────────
// VIEWPORT
// ─────────────────────────────────────────────────────────────────────────────
function applyTransform() {
  if (!isFinite(vx) || !isFinite(vy) || !isFinite(vz) || vz <= 0) {
    vx = 0; vy = 0; vz = 1;
  }
  canvas.style.transform = 'translate3d(' + vx + 'px,' + vy + 'px,0) scale(' + vz + ')';
  if (zoomLabel) zoomLabel.textContent = Math.round(vz * 100) + '%';
  if (!isZooming && !isPanning) {
    updateAllConnections();
    if (typeof updateSpawnArrow === 'function') updateSpawnArrow();
  }
}

function applyTransformRAF() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => {
    _rafPending = false;
    applyTransform();
  });
}

function screenToCanvas(sx, sy) {
  const r = wrap.getBoundingClientRect();
  return { x: (sx - r.left - vx) / vz, y: (sy - r.top - vy) / vz };
}

function clamp(v,a,b) { return Math.max(a,Math.min(b,v)); }

function zoomAround(factor, cx, cy) {
  try {
    const r = wrap.getBoundingClientRect();
    const mx = cx - r.left, my = cy - r.top;
    const prevZ = vz;
    const nz = clamp(vz * factor, MIN_Z, MAX_Z);
    if (!prevZ || prevZ === 0) return;
    const newVx = mx - (mx - vx) * (nz / prevZ);
    const newVy = my - (my - vy) * (nz / prevZ);
    if (!isFinite(newVx) || !isFinite(newVy) || !isFinite(nz)) return;
    vx = newVx; vy = newVy; vz = nz;
    applyTransform();
  } catch(e) {}
}

// ── SEARCH ──────────────────────────────────────────────────────────────────
const tbSearch = document.getElementById('tb-search');
const tbSearchClear = document.getElementById('tb-search-clear');

function doSearch(query) {
  const board = currentBoard();
  if (!board) return;
  const q = query.trim().toLowerCase();
  
  board.notes.forEach(note => {
    const el = document.getElementById('note-' + note.id);
    if (!el) return;
    if (!q) {
      el.classList.remove('search-match', 'search-hidden');
      return;
    }
    const title = (note.title || '').toLowerCase();
    const text  = (note.text  || '').toLowerCase();
    const tags  = (note.tags  || []).join(' ').toLowerCase();
    const match = title.includes(q) || text.includes(q) || tags.includes(q);
    el.classList.toggle('search-match',  match);
    el.classList.toggle('search-hidden', !match);
  });
}

function clearSearch() {
  tbSearch.value = '';
  tbSearchClear.classList.remove('visible');
  doSearch('');
}

document.getElementById('btn-add-text').addEventListener('click', () => {
  const r = wrap.getBoundingClientRect();
  const pt = screenToCanvas(r.left + r.width/2, r.top + r.height/2);
  addTextNode(pt.x - 60, pt.y - 20);
});

tbSearch.addEventListener('input', e => {
  const q = e.target.value;
  tbSearchClear.classList.toggle('visible', q.length > 0);
  doSearch(q);
});

tbSearch.addEventListener('keydown', e => {
  if (e.key === 'Escape') clearSearch();
  e.stopPropagation(); // prevent canvas events
});

tbSearch.addEventListener('pointerdown', e => e.stopPropagation());
tbSearchClear.addEventListener('click', clearSearch);

// Search cleared in switchBoard function directly
function fitAll() {
  const board = currentBoard();
  if (!board || !board.notes.length) return;
  const r = wrap.getBoundingClientRect();
  const pad = 70;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  board.notes.forEach(n => {
    const el = document.getElementById('note-'+n.id);
    const w = el ? el.offsetWidth : 200;
    const h = el ? el.offsetHeight : 150;
    minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + w);
    maxY = Math.max(maxY, n.y + h);
  });
  const bw = maxX-minX+pad*2, bh = maxY-minY+pad*2;
  const nz = clamp(Math.min(r.width/bw, r.height/bh), MIN_Z, MAX_Z);
  vx = (r.width  - bw*nz)/2 - (minX-pad)*nz;
  vy = (r.height - bh*nz)/2 - (minY-pad)*nz;
  vz = nz;
  applyTransform();
  // Save viewport on current board
  board.vx = vx; board.vy = vy; board.vz = vz;
  saveBoards();
}

// ─────────────────────────────────────────────────────────────────────────────
// NOTES
// ─────────────────────────────────────────────────────────────────────────────
function addNote(x, y) {
  const board = currentBoard();
  if (!board) return null;
  const id = nextNoteId++;
  const note = { id, x, y, title: '', text: '', media: [], tags: [], zIndex: id, _isNew: true };
  board.notes.push(note);
  renderNote(note);
  haptic("medium");
  saveBoards();
  // Re-apply active search - hide new note if doesn't match
  const _sq = document.getElementById('tb-search');
  if (_sq && _sq.value.trim()) {
    doSearch(_sq.value);
  }
  return note;
}

function renderNote(note) {
  const old = document.getElementById('note-'+note.id);
  if (old) old.remove();

  // Clamp coordinates within canvas bounds (handles notes from old larger canvas)
  note.x = Math.max(0, Math.min(note.x, 2800));
  note.y = Math.max(0, Math.min(note.y, 2800));

  const el = document.createElement('div');
  el.className = 'note';
  el.id = 'note-'+note.id;
  // Apply saved size if exists
  const noteW = note.w ? note.w + 'px' : '220px';
  const noteH = note.h ? note.h + 'px' : '';
  el.style.cssText = `left:${note.x}px;top:${note.y}px;z-index:${note.zIndex};width:${noteW};${note.h ? 'height:' + noteH + ';' : ''}`;
  // Restore border color if set
  if (note.borderColor) {
    el.style.border = `2px solid ${note.borderColor}`;
    el.style.boxShadow = `0 4px 24px rgba(80,45,15,0.10), 0 1px 4px rgba(80,45,15,0.06), inset 0 1px 0 rgba(255,255,255,0.9), 0 0 0 1px ${note.borderColor}22`;
  }

  // No corner dots – connect via tap on note body in connect mode
  // Resize handle – bottom-right, visible only in connect mode
  const resizeHandle = document.createElement('div');
  resizeHandle.className = 'note-resize';
  resizeHandle.title = 'Изменить размер';
  resizeHandle.innerHTML = '';
  el.appendChild(resizeHandle);
  resizeHandle.addEventListener('pointerdown', e => onResizePointerDown(e, note, el));

  // 3-dot menu button – top-right, connect mode only
  const menuBtn = document.createElement('button');
  menuBtn.className = 'note-menu-btn';
  menuBtn.innerHTML = '<svg viewBox="0 0 16 4" fill="#7a604e" width="14" height="4"><circle cx="2" cy="2" r="1.5"/><circle cx="8" cy="2" r="1.5"/><circle cx="14" cy="2" r="1.5"/></svg>';
  menuBtn.addEventListener('pointerdown', e => e.stopPropagation());
  menuBtn.addEventListener('click', e => {
    e.stopPropagation();
    openNoteCtxMenu(e, note, el);
  });
  el.appendChild(menuBtn);

  // Header
  const head = document.createElement('div');
  head.className = 'n-head';

  const dot = document.createElement('div'); dot.className = 'n-dot';
  const title = document.createElement('input');
  title.className = 'n-title'; title.type = 'text';
  title.placeholder = 'Title…'; title.value = note.title;
  title.addEventListener('input', e => { note.title = e.target.value; saveBoards(); });
  title.addEventListener('pointerdown', e => e.stopPropagation());

  const imgBtn = document.createElement('button');
  imgBtn.className = 'n-img-btn'; imgBtn.title = 'Add image';
  imgBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="14" rx="3"/><polyline points="3 13 8 8 12 12 16 8 21 13"/></svg>`;
  imgBtn.addEventListener('pointerdown', e => e.stopPropagation());
  imgBtn.addEventListener('click', e => { e.stopPropagation(); pendingMediaNoteId = note.id; fileInput.click(); });

  head.appendChild(dot); head.appendChild(title); head.appendChild(imgBtn);

  // Body
  const body = document.createElement('div'); body.className = 'n-body';
  const ta = document.createElement('textarea');
  ta.className = 'n-text'; ta.placeholder = 'Write something…';
  ta.value = note.text; ta.rows = 3;
  ta.addEventListener('input', e => {
    note.text = e.target.value;
    e.target.style.height = 'auto';
    e.target.style.height = e.target.scrollHeight + 'px';
    saveBoards();
  });
  ta.addEventListener('pointerdown', e => e.stopPropagation());

  const mediaList = document.createElement('div');
  mediaList.className = 'n-media'; mediaList.id = 'media-'+note.id;
  note.media.forEach(m => appendMediaItem(mediaList, note, m));

  body.appendChild(ta); body.appendChild(mediaList);

  // Footer
  const foot = document.createElement('div'); foot.className = 'n-foot';
  note.tags.forEach(tag => {
    const t = document.createElement('button');
    t.className = 'n-tag'; t.textContent = tag;
    foot.appendChild(t);
  });
  const addTag = document.createElement('button');
  addTag.className = 'n-tag add'; addTag.textContent = '+ tag';
  addTag.addEventListener('pointerdown', e => e.stopPropagation());
  addTag.addEventListener('click', e => {
    e.stopPropagation();
    showTagInput(note, el, addTag);
  });
  foot.appendChild(addTag);

  el.appendChild(head); el.appendChild(body); el.appendChild(foot);

  // Drag via header
  head.addEventListener('pointerdown', e => onNotePointerDown(e, note));
  el.addEventListener('pointerdown', () => bringToFront(note));
  el.addEventListener('click', e => {
    if (!connectMode) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
    if (e.target.closest('.note-menu-btn') || e.target.closest('.note-resize')) return;
    e.stopPropagation();
    handleConnectTap(note.id, el);
  });

  // Double-tap to delete
  let lastTap = 0;
  head.addEventListener('click', e => {
    if (e.target === head || e.target === dot) {
      const now = Date.now();
      if (now - lastTap < 280) { deleteNote(note.id); }
      lastTap = now;
    }
  });

  canvas.appendChild(el);
  if (connectMode) el.classList.add('connect-mode');
  if (note.status) renderStatusBadge(note, el);
  if (note.skin) applyNoteSkin(note, el, note.skin);
  if (note.shape && SHAPE_RADII) el.style.borderRadius = SHAPE_RADII[note.shape] || '';
  // Spawn animation only for new notes (not restoring)
  if (note._isNew) { el.classList.add('note-spawn'); delete note._isNew; }

  // Wire note page editor (tap on body opens full editor)
  _patchNoteEditorTap(note, el);
}

// Tap handler for note body → open page editor
// Defined here so renderNote can call it; implementation filled by editor IIFE below
var _patchNoteEditorTap = function(note, el) {};

function appendMediaItem(list, note, m) {
  const item = document.createElement('div'); item.className = 'n-media-item';
  let media;
  if (m.type === 'video') {
    media = document.createElement('video');
    media.src = m.src; media.controls = true; media.preload = 'metadata';
  } else {
    media = document.createElement('img'); media.src = m.src; media.alt = '';
  }
  const rm = document.createElement('button'); rm.className = 'n-media-rm'; rm.textContent = '✕';
  rm.addEventListener('click', e => {
    e.stopPropagation();
    note.media = note.media.filter(x => x.id !== m.id);
    item.remove(); saveBoards();
  });
  item.appendChild(media); item.appendChild(rm);
  list.appendChild(item);
}

fileInput.addEventListener('change', e => {
  const board = currentBoard(); if (!board) return;
  const note = board.notes.find(n => n.id === pendingMediaNoteId); if (!note) return;
  Array.from(e.target.files).forEach(file => {
    if (file.type.startsWith('video')) {
      // Videos stored as-is (can't compress easily)
      const reader = new FileReader();
      reader.onload = ev => {
        const m = { id: Date.now()+Math.random(), src: ev.target.result, type: 'video' };
        note.media.push(m);
        const list = document.getElementById('media-'+note.id);
        if (list) appendMediaItem(list, note, m);
        saveBoards();
      };
      reader.readAsDataURL(file);
    } else {
      // Images: compress via canvas before saving
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          // Scale down if too large (max 1200px on longest side)
          const MAX = 1200;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) {
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else       { w = Math.round(w * MAX / h); h = MAX; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          const compressed = canvas.toDataURL('image/jpeg', 0.72);
          const m = { id: Date.now()+Math.random(), src: compressed, type: 'image' };
          note.media.push(m);
          const list = document.getElementById('media-'+note.id);
          if (list) appendMediaItem(list, note, m);
          saveBoards();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }
  });
  fileInput.value = ''; pendingMediaNoteId = null;
});

function bringToFront(note) {
  const board = currentBoard(); if (!board) return;
  const maxZ = Math.max(...board.notes.map(n => n.zIndex), 0);
  note.zIndex = maxZ + 1;
  const el = document.getElementById('note-'+note.id);
  if (el) el.style.zIndex = note.zIndex;
}

function deleteNote(id) {
  const board = currentBoard(); if (!board) return;
  // Remove all connections involving this note
  const toRm = board.connections.filter(c => c.from === id || c.to === id);
  toRm.forEach(c => {
    board.connections = board.connections.filter(x => x.id !== c.id);
    // Remove by element id
    const l = document.getElementById('conn-' + c.id);
    if (l) l.remove();
  });
  // Also nuke any orphaned lines by querying SVG directly
  svgLayer.querySelectorAll('path').forEach(p => {
    if (p.id && p.id.startsWith('conn-')) {
      const cid = parseInt(p.id.replace('conn-', ''));
      if (!board.connections.find(c => c.id === cid)) p.remove();
    }
  });
  board.notes = board.notes.filter(n => n.id !== id);
  const el = document.getElementById('note-' + id);
  if (el) {
    haptic('heavy');
    disintegrateNote(el);
  }
  saveBoards();
}

// ─────────────────────────────────────────────────────────────────────────────
// NOTE DRAG (pointer events)
// ─────────────────────────────────────────────────────────────────────────────
function onNotePointerDown(e, note) {
  if (connectMode) return;
  if (['INPUT','TEXTAREA','BUTTON'].includes(e.target.tagName)) return;
  if (e.target.classList.contains('note-resize')) return; // let resize handle its own drag
  e.stopPropagation(); e.preventDefault();

  bringToFront(note);
  isDragging = true; dragNoteId = note.id;

  const pt = screenToCanvas(e.clientX, e.clientY);
  dragOff = { x: pt.x - note.x, y: pt.y - note.y };

  const el = document.getElementById('note-'+note.id);
  el.classList.add('drag');
  el.setPointerCapture(e.pointerId);

  el.addEventListener('pointermove', onDragMove);
  el.addEventListener('pointerup', onDragUp);
  el.addEventListener('pointercancel', onDragUp);
}

function onDragMove(e) {
  if (!isDragging) return;
  const board = currentBoard(); if (!board) return;
  const note = board.notes.find(n => n.id === dragNoteId); if (!note) return;
  const pt = screenToCanvas(e.clientX, e.clientY);
  note.x = pt.x - dragOff.x; note.y = pt.y - dragOff.y;
  const el = document.getElementById('note-'+note.id);
  if (el) { el.style.left = note.x+'px'; el.style.top = note.y+'px'; }
  updateAllConnections();
}

function onDragUp(e) {
  if (!isDragging) return;
  isDragging = false;
  const el = document.getElementById('note-'+dragNoteId);
  if (el) {
    el.classList.remove('drag');
    el.removeEventListener('pointermove', onDragMove);
    el.removeEventListener('pointerup', onDragUp);
    el.removeEventListener('pointercancel', onDragUp);
  }
  dragNoteId = null;
  saveBoardsDebounced();
}

// ─────────────────────────────────────────────────────────────────────────────
// CONNECTIONS
// ─────────────────────────────────────────────────────────────────────────────
function noteCenter(id) {
  // Try regular note
  const noteEl = document.getElementById('note-' + id);
  if (noteEl) {
    return {
      x: parseFloat(noteEl.style.left) + noteEl.offsetWidth / 2,
      y: parseFloat(noteEl.style.top)  + noteEl.offsetHeight / 2,
    };
  }
  // Try text node
  const tnEl = document.getElementById('tn-' + id);
  if (tnEl) {
    return {
      x: parseFloat(tnEl.style.left) + tnEl.offsetWidth / 2,
      y: parseFloat(tnEl.style.top)  + tnEl.offsetHeight / 2,
    };
  }
  return { x: 0, y: 0 };
}

function curvePath(x1,y1,x2,y2,waveY1,waveY2) {
  if (!isFinite(x1)||!isFinite(y1)||!isFinite(x2)||!isFinite(y2)) return 'M0,0';
  const dx = x2-x1;
  const dy = y2-y1;
  const perp = { x: -dy*0.18, y: dx*0.18 };
  return `M${x1},${y1} C${x1+dx*0.45+perp.x+waveY1},${y1+dy*0.1+perp.y+waveY1} ${x2-dx*0.45-perp.x+waveY2},${y2-dy*0.1-perp.y+waveY2} ${x2},${y2}`;
}

function renderConnection(conn) {
  const old = document.getElementById('conn-'+conn.id); if (old) old.remove();
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.id = 'conn-'+conn.id; path.className.baseVal = 'c-line';
  // Vary animation timing per connection for organic shimmer feel
  const dur = (2.5 + (conn.id % 5) * 0.5).toFixed(1);
  const delay = -((conn.id % 8) * 0.4).toFixed(1);
  path.style.animationDuration = dur + 's';
  path.style.animationDelay = delay + 's';
  path.addEventListener('click', e => {
    e.stopPropagation();
    if (confirm('Remove connection?')) {
      const board = currentBoard(); if (!board) return;
      board.connections = board.connections.filter(c => c.id !== conn.id);
      path.remove(); saveBoards();
    }
  });
  svgLayer.appendChild(path);
  initConnWave(conn.id);
  // Apply current color
  const lc = document.documentElement.getAttribute('data-line-color');
  if (lc) path.style.stroke = lc;
  updateConn(conn);
}

function updateConn(conn) {
  const path = document.getElementById('conn-'+conn.id); if (!path) return;
  const a = noteCenter(conn.from), b = noteCenter(conn.to);
  path.setAttribute('d', curvePath(a.x,a.y,b.x,b.y));
}

function updateAllConnections() {
  const board = currentBoard(); if (!board) return;
  board.connections.forEach(c => updateConn(c));
}

function createConnection(fromId, toId) {
  const board = currentBoard(); if (!board) return;
  if (fromId === toId) return;
  if (board.connections.find(c=>(c.from===fromId&&c.to===toId)||(c.from===toId&&c.to===fromId))) {
    showToast('Already connected'); return;
  }
  const conn = { id: nextConnId++, from: fromId, to: toId };
  board.connections.push(conn);
  renderConnection(conn);
  saveBoards();
  showToast('Connected ✓');
}

// ─────────────────────────────────────────────────────────────────────────────
// CONNECT DOT DRAG
// ─────────────────────────────────────────────────────────────────────────────

// ─── NOTE RESIZE (pointer drag on bottom-right handle) ───────────────────────
function onResizePointerDown(e, note, el) {
  if (!connectMode) return;
  e.stopPropagation();
  e.preventDefault();

  const startW  = el.offsetWidth;
  const startH  = el.offsetHeight;
  const startPX = e.clientX;
  const startPY = e.clientY;

  // Calculate smart minimum height based on actual content
  function calcMinSize() {
    const head = el.querySelector('.n-head');
    const foot = el.querySelector('.n-foot');
    const media = el.querySelector('.n-media');
    const headH = head ? head.offsetHeight : 38;
    const footH = foot ? foot.offsetHeight : 32;
    // If there are images, measure their natural rendered heights
    let mediaH = 0;
    if (media) {
      const imgs = media.querySelectorAll('img, video');
      imgs.forEach(img => { mediaH += img.naturalHeight > 0
        ? Math.min(img.offsetWidth * (img.naturalHeight / img.naturalWidth), img.offsetHeight)
        : img.offsetHeight; });
      if (imgs.length === 0) mediaH = media.offsetHeight;
    }
    // Min width = at least 160px; can't go narrower than images
    const minW = 160;
    // Min height = head + at least one line of text (20px) + media + footer
    const minH = headH + 20 + mediaH + footH + 10;
    return { minW, minH: Math.max(80, minH) };
  }

  el.setPointerCapture(e.pointerId);
  el.style.transition = 'none';

  function onMove(ev) {
    const dx = (ev.clientX - startPX) / vz;
    const dy = (ev.clientY - startPY) / vz;
    const { minW, minH } = calcMinSize();
    const newW = Math.max(minW, startW + dx);
    const newH = Math.max(minH, startH + dy);
    el.style.width  = newW + 'px';
    el.style.height = newH + 'px';
    note.w = newW;
    note.h = newH;
    updateAllConnections();
  }

  function onUp() {
    el.removeEventListener('pointermove', onMove);
    el.removeEventListener('pointerup',   onUp);
    el.removeEventListener('pointercancel', onUp);
    el.style.transition = '';
    saveBoards();
  }

  el.addEventListener('pointermove',   onMove);
  el.addEventListener('pointerup',     onUp);
  el.addEventListener('pointercancel', onUp);
}

function onCdotPointerDown(e) {
  if (!connectMode) return;
  e.stopPropagation(); e.preventDefault();
  const tappedId = parseInt(e.target.dataset.nid);
  if (connectSrc === null) {
    connectSrc = tappedId;
    const el = document.getElementById('note-'+connectSrc);
    el.classList.add('sel');
    showToast('Tap another note to connect');
  } else {
    const fromId = connectSrc;
    connectSrc = null;
    const fromEl = document.getElementById('note-'+fromId);
    if (fromEl) fromEl.classList.remove('sel');
    if (tappedId !== fromId) createConnection(fromId, tappedId);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// CANVAS TOUCH / POINTER (pan + pinch)
// ─────────────────────────────────────────────────────────────────────────────
// ── PINCH ZOOM (2 fingers only via touch events) ─────────────────────────────
wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    // Reset pinch baseline on every new 2-finger touch to avoid scale jump
    const t0 = e.touches[0], t1 = e.touches[1];
    lastPinchDist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    lastPinchMid  = { x: (t0.clientX + t1.clientX) / 2, y: (t0.clientY + t1.clientY) / 2 };
    isZooming = true;
    isPanning = false;
    pauseHeavyWork();
  }
}, { passive: true });

wrap.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const t0 = e.touches[0], t1 = e.touches[1];
    const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    const midX = (t0.clientX + t1.clientX) / 2;
    const midY = (t0.clientY + t1.clientY) / 2;
    if (lastPinchDist && dist > 0) {
      // Clamp factor tightly to prevent runaway on sudden finger lift/place
      const rawFactor = dist / lastPinchDist;
      const factor = clamp(rawFactor, 0.90, 1.10);
      const r = wrap.getBoundingClientRect();
      const mx = midX - r.left;
      const my = midY - r.top;
      const nz = clamp(vz * factor, MIN_Z, MAX_Z);
      if (isFinite(nz) && vz > 0 && isFinite(mx) && isFinite(my)) {
        vx = mx - (mx - vx) * (nz / vz);
        vy = my - (my - vy) * (nz / vz);
        if (lastPinchMid) {
          vx += midX - lastPinchMid.x;
          vy += midY - lastPinchMid.y;
        }
        vz = nz;
        // Apply directly (no rAF queue — touchmove already fires in rAF cadence on iOS)
        if (!isFinite(vx) || !isFinite(vy)) { vx = 0; vy = 0; }
        canvas.style.transform = 'translate3d(' + vx + 'px,' + vy + 'px,0) scale(' + vz + ')';
        if (zoomLabel) zoomLabel.textContent = Math.round(vz * 100) + '%';
      }
    }
    lastPinchDist = dist;
    lastPinchMid = { x: midX, y: midY };
  }
}, { passive: false });

wrap.addEventListener('touchend', e => {
  if (e.touches.length < 2) {
    lastPinchDist = null;
    lastPinchMid  = null;
  }
  if (e.touches.length === 0) {
    isZooming = false;
    setTimeout(resumeHeavyWork, 150);
  }
});

// ── PAN & SINGLE TOUCH via Pointer Events ─────────────────────────────────────
wrap.addEventListener('pointerdown', e => {
  if (e.target !== wrap && e.target !== canvas && e.target !== svgLayer) return;
  pointers[e.pointerId] = {x: e.clientX, y: e.clientY};
  wrap.setPointerCapture(e.pointerId);
  const ids = Object.keys(pointers);
  if (ids.length === 1) {
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY, vx, vy };
  } else {
    isPanning = false;
    panStart = null;
  }
});

wrap.addEventListener('pointermove', e => {
  if (!pointers[e.pointerId]) return;
  pointers[e.pointerId] = {x: e.clientX, y: e.clientY};
  const ids = Object.keys(pointers);
  if (ids.length === 1 && isPanning && panStart) {
    vx = panStart.vx + (e.clientX - panStart.x);
    vy = panStart.vy + (e.clientY - panStart.y);
    applyTransformRAF();
  }
});

wrap.addEventListener('pointerup', e => {
  delete pointers[e.pointerId];
  const ids = Object.keys(pointers);
  if (ids.length === 0) {
    isPanning = false;
    lastPinchDist = null;
    if (!isZooming) updateAllConnections();
  } else if (ids.length === 1 && !isZooming) {
    const [p] = Object.values(pointers);
    panStart = { x: p.x, y: p.y, vx, vy };
    isPanning = true; lastPinchDist = null;
  }
});
wrap.addEventListener('pointercancel', e => {
  delete pointers[e.pointerId];
  if (Object.keys(pointers).length === 0) { isPanning = false; lastPinchDist = null; }
});

// Mouse wheel zoom
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.10 : 0.91;
  zoomAround(factor, e.clientX, e.clientY);
  if (!_rafPending) {
    _rafPending = true;
    requestAnimationFrame(() => {
      _rafPending = false;
      updateAllConnections();
      if (typeof updateSpawnArrow === 'function') updateSpawnArrow();
    });
  }
}, { passive: false });

// Double click / tap to add note
let lastTapCanvas = 0;
wrap.addEventListener('click', e => {
  if (e.target !== wrap && e.target !== canvas && e.target !== svgLayer) return;
  const now = Date.now();
  if (now - lastTapCanvas < 300) {
    const pt = screenToCanvas(e.clientX, e.clientY);
    const note = addNote(pt.x - 100, pt.y - 50);
    if (note) setTimeout(() => (document.querySelector('#note-'+note.id+' .n-title') || {focus:function(){}}).focus(), 60);
  }
  lastTapCanvas = now;
});

// INIT
// ─────────────────────────────────────────────────────────────────────────────
function init() {
  const loaded = loadBoards();

  if (!loaded || !boards.length) {
    // Create default board
    const b = createBoard('Board 1');
    activeBoardId = b.id;

    // Center canvas
    const r = wrap.getBoundingClientRect();
    const cx = 1500, cy = 1500;
    vx = r.width/2  - cx * vz;
    vy = r.height/2 - cy * vz;

    // Demo notes
    const n1 = addNote(cx-220, cy-70, 'Welcome', 'Double-tap canvas to add a note. Drag notes to move.');
    const n2 = addNote(cx+40,  cy-130);
    const n3 = addNote(cx-80,  cy+90);
    if (n1) { n1.title='Welcome'; n1.text='Double-tap canvas to add a note.'; document.querySelector('#note-'+n1.id+' .n-title').value='Welcome'; document.querySelector('#note-'+n1.id+' .n-text').value='Double-tap canvas to add a note.'; }
    if (n2) { n2.title='Ideas'; document.querySelector('#note-'+n2.id+' .n-title').value='Ideas'; }
    if (n3) { n3.title='Next Steps'; document.querySelector('#note-'+n3.id+' .n-title').value='Next Steps'; }

    setTimeout(() => {
      if(n1&&n2) createConnection(n1.id, n2.id);
      if(n1&&n3) createConnection(n1.id, n3.id);
    }, 80);

    b.vx = vx; b.vy = vy; b.vz = vz;
    applyTransform();
    saveBoards();
  } else {
    // Restore nextIds
    boards.forEach(b => {
      b.notes.forEach(n => { if (n.id >= nextNoteId) nextNoteId = n.id+1; });
      b.connections.forEach(c => { if (c.id >= nextConnId) nextConnId = c.id+1; });
    });
    // Switch to last active board
    if (!boards.find(b => b.id === activeBoardId)) activeBoardId = boards[0].id;
    switchBoard(activeBoardId);
  }

  // Open IndexedDB and load full data (with photos) async
  openDB().then(database => {
    db = database;
    loadBoardsFromDB();
  }).catch(() => {
    // IndexedDB unavailable - localStorage only mode
    console.warn('IndexedDB unavailable, using localStorage only');
  });
}

const settingsPanel = document.getElementById('settings-panel');
const bgColorPicker = document.getElementById('bg-color-picker');

function applyBgColor(color) {
  const dark = isColorDark(color);
  const dotColor = dark ? 'rgba(255,255,255,0.1)' : 'rgba(140,100,60,0.12)';
  const bgImage = `radial-gradient(circle, ${dotColor} 1.3px, transparent 1.3px)`;
  
  // Set on both body AND wrap to ensure visibility
  document.body.style.cssText += `;background-color:${color};background-image:${bgImage};background-size:26px 26px`;
  const wrap = document.getElementById('wrap');
  if (wrap) {
    wrap.style.backgroundColor = color;
    wrap.style.backgroundImage = bgImage;
    wrap.style.backgroundSize = '26px 26px';
  }
  // Update theme-color meta so status bar matches background
  const themeMeta = document.getElementById('theme-color-meta');
  if (themeMeta) themeMeta.setAttribute('content', color);

  // Toggle dark-mode class on body for CSS theming
  document.body.classList.toggle('dark-bg', dark);

  // Update toolbar text color for dark backgrounds
  const toolbar = document.getElementById('toolbar');
  if (toolbar) {
    toolbar.style.color = dark ? 'rgba(255,255,255,0.85)' : '';
  }
  // Update connection line stroke color directly (CSS vars don't work in keyframes)
  const lineStroke = dark ? '#ffb840' : '#e07a3a';
  document.querySelectorAll('.c-line').forEach(el => {
    el.style.stroke = lineStroke;
  });
  // Store for new connections
  document.documentElement.setAttribute('data-line-color', lineStroke);

  // Update fit button icon color directly on SVG
  // fit-btn-svg removed

  // update active swatch
  document.querySelectorAll('.bg-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.color === color);
  });
  try { bgColorPicker.value = /^#[0-9a-f]{6}$/i.test(color) ? color : '#f7f4f0'; } catch(e){}
}

function isColorDark(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) < 128;
}

function saveBgColor(color) {
  try { localStorage.setItem('board-app-bgcolor', color); } catch(e) {}
}

function loadBgColor() {
  try { return localStorage.getItem('board-app-bgcolor') || '#f7f4f0'; } catch(e) { return '#f7f4f0'; }
}

// Init bg color
applyBgColor(loadBgColor());

// ── FREE TEXT NODES ──────────────────────────────────────────────────────────

const TEXT_COLORS = [
  '#26201a', '#7a604e', '#e07a3a', '#d94f3a',
  '#4a90d9', '#5baa6a', '#9b6dd9', '#d9b84a',
  '#ffffff', '#f7f4f0', '#ff6b9d', '#00c896'
];

function addTextNode(x, y) {
  const board = currentBoard(); if (!board) return null;
  const id = nextNoteId++;
  const tn = { id, x, y, text: '', color: '#26201a', size: 20,
                w: null, zIndex: id, type: 'text' };
  if (!board.textNodes) board.textNodes = [];
  board.textNodes.push(tn);
  renderTextNode(tn);
  saveBoards();
  return tn;
}

function renderTextNode(tn) {
  const existing = document.getElementById('tn-' + tn.id);
  if (existing) existing.remove();

  const el = document.createElement('div');
  el.className = 'text-node';
  el.id = 'tn-' + tn.id;
  el.style.left = tn.x + 'px';
  el.style.top  = tn.y + 'px';
  el.style.zIndex = tn.zIndex;
  if (tn.w) { el.style.width = tn.w + 'px'; el.style.maxWidth = 'none'; }

  // ── Textarea ─────────────────────────────────────────────────
  const ta = document.createElement('textarea');
  ta.className = 'text-node-input';
  ta.placeholder = 'Текст...';
  ta.value = tn.text;
  ta.style.fontSize = (tn.size || 20) + 'px';
  ta.style.color = tn.color || '#26201a';
  ta.rows = 1;
  ta.style.pointerEvents = 'none'; // disabled until tap-to-edit

  function autoResize() {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
    updateAllConnections();
  }
  ta.addEventListener('input', () => { tn.text = ta.value; autoResize(); saveBoards(); });
  ta.addEventListener('keydown', e => e.stopPropagation());
  ta.addEventListener('blur', () => {
    // Re-disable pointer events after editing so drag works again
    setTimeout(() => { ta.style.pointerEvents = 'none'; }, 100);
  });
  el.appendChild(ta);
  setTimeout(autoResize, 0);

  // ── Pointer handling on el ────────────────────────────────────
  let tapTimer = null;
  let dragStarted = false;

  el.addEventListener('pointerdown', e => {
    if (e.target.closest('.note-menu-btn') || e.target.closest('.note-resize')) return;

    // Connect mode
    if (connectMode) {
      e.stopPropagation(); e.preventDefault();
      handleConnectTap(tn.id, el);
      return;
    }

    e.stopPropagation();
    dragStarted = false;

    const startX = e.clientX, startY = e.clientY;
    const ox = tn.x, oy = tn.y;
    el.setPointerCapture(e.pointerId);

    // Disable text selection during potential drag
    ta.style.userSelect = 'none';
    ta.style.webkitUserSelect = 'none';

    function onMove(ev) {
      const dx = (ev.clientX - startX) / vz;
      const dy = (ev.clientY - startY) / vz;
      if (!dragStarted && Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
      dragStarted = true;
      if (tapTimer) { clearTimeout(tapTimer); tapTimer = null; }
      tn.x = ox + dx; tn.y = oy + dy;
      el.style.left = tn.x + 'px';
      el.style.top  = tn.y + 'px';
      updateAllConnections();
    }

    function onUp() {
      el.removeEventListener('pointermove', onMove);
      el.removeEventListener('pointerup', onUp);
      ta.style.userSelect = '';
      ta.style.webkitUserSelect = '';
      if (dragStarted) {
        saveBoards();
      } else {
        // Tap: enable editing
        ta.style.pointerEvents = 'auto';
        ta.focus();
        // Place cursor at end
        ta.selectionStart = ta.selectionEnd = ta.value.length;
      }
    }

    el.addEventListener('pointermove', onMove);
    el.addEventListener('pointerup', onUp);
  });

  // ── Resize handle ────────────────────────────────────────────
  const resizeHandle = document.createElement('div');
  resizeHandle.className = 'note-resize';
  el.appendChild(resizeHandle);
  resizeHandle.addEventListener('pointerdown', e => {
    if (!connectMode) return;
    e.stopPropagation(); e.preventDefault();
    const startW = el.offsetWidth, startPX = e.clientX;
    el.setPointerCapture(e.pointerId);
    function onMove(ev) {
      const newW = Math.max(60, startW + (ev.clientX - startPX) / vz);
      el.style.width = newW + 'px';
      el.style.maxWidth = 'none';
      tn.w = newW; autoResize();
    }
    function onUp() {
      el.removeEventListener('pointermove', onMove);
      el.removeEventListener('pointerup', onUp);
      saveBoards();
    }
    el.addEventListener('pointermove', onMove);
    el.addEventListener('pointerup', onUp);
  });

  // ── 3-dot menu ───────────────────────────────────────────────
  const menuBtn = document.createElement('button');
  menuBtn.className = 'note-menu-btn';
  menuBtn.innerHTML = '<svg viewBox="0 0 16 4" fill="#7a604e" width="14" height="4"><circle cx="2" cy="2" r="1.5"/><circle cx="8" cy="2" r="1.5"/><circle cx="14" cy="2" r="1.5"/></svg>';
  menuBtn.addEventListener('pointerdown', e => e.stopPropagation());
  menuBtn.addEventListener('click', e => {
    e.stopPropagation();
    openTextNodeCtxMenu(e, tn, el, ta);
  });
  el.appendChild(menuBtn);

  canvas.appendChild(el);
  setTimeout(autoResize, 0);
  // Auto-focus if new (no text yet)
  if (!tn.text) {
    setTimeout(() => {
      ta.style.pointerEvents = 'auto';
      ta.focus();
    }, 60);
  }
}

// ── WAVE ANIMATION FOR CONNECTION LINES ─────────────────────────────────────
const connWavePhases = {};  // conn.id → { phase1, phase2, speed, amp }

function initConnWave(connId) {
  if (connWavePhases[connId]) return;
  connWavePhases[connId] = {
    phase1: Math.random() * Math.PI * 2,
    phase2: Math.random() * Math.PI * 2,
    speed: 0.4 + Math.random() * 0.5,
    amp:   8 + Math.random() * 14,
  };
}

let waveTime = 0;
let waveRaf = null;

let isZooming = false;
let zoomEndTimer = null;

function animateWaves() {
  waveRaf = requestAnimationFrame(animateWaves);
  // Skip wave animation during zoom to prevent WebKit overload
  if (isZooming) return;
  waveTime += 0.018;
  const board = currentBoard();
  if (!board || !board.connections.length) return;
  board.connections.forEach(conn => {
    try {
      initConnWave(conn.id);
      const p = connWavePhases[conn.id];
      if (!p) return;
      const w1 = Math.sin(waveTime * p.speed + p.phase1) * p.amp;
      const w2 = Math.sin(waveTime * p.speed + p.phase2 + 1.2) * p.amp * 0.7;
      const path = document.getElementById('conn-' + conn.id);
      if (!path) return;
      const a = noteCenter(conn.from), b = noteCenter(conn.to);
      if (!a || !b) return;
      path.setAttribute('d', curvePath(a.x, a.y, b.x, b.y, w1, w2));
    } catch(e) {}
  });
}

// Start wave animation
animateWaves();

// ── SPAWN DIRECTION ARROW ─────────────────────────────────────────────────────
const spawnArrow = document.getElementById('spawn-arrow');
const ARROW_MARGIN = 44; // distance from screen edge

function updateSpawnArrow() {
  const board = currentBoard();
  if (!board || board.spawnX === undefined || !spawnActive) {
    spawnArrow.classList.remove('visible');
    return;
  }

  // Convert spawn canvas coords to screen coords
  const sx = board.spawnX * vz + vx;
  const sy = board.spawnY * vz + vy;
  const W = window.innerWidth;
  const H = window.innerHeight;
  const pad = ARROW_MARGIN;

  // Check if spawn is visible on screen
  if (sx >= pad && sx <= W - pad && sy >= pad && sy <= H - pad) {
    spawnArrow.classList.remove('visible');
    return;
  }

  // Spawn is off-screen — show arrow pointing toward it
  spawnArrow.classList.add('visible');

  // Calculate angle from center of screen to spawn
  const cx = W / 2, cy = H / 2;
  const angle = Math.atan2(sy - cy, sx - cx);

  // Position arrow on screen edge
  const edgePad = 36;
  let ex = cx + Math.cos(angle) * (Math.min(W, H) * 0.5 - edgePad);
  let ey = cy + Math.sin(angle) * (Math.min(W, H) * 0.5 - edgePad);

  // Clamp to screen bounds
  ex = Math.max(edgePad, Math.min(W - edgePad, ex));
  ey = Math.max(edgePad + 60, Math.min(H - edgePad - 60, ey));

  spawnArrow.style.left = (ex - 14) + 'px';
  spawnArrow.style.top  = (ey - 14) + 'px';

  // Rotate arrow to point at spawn
  const deg = (angle * 180 / Math.PI) + 90;
  spawnArrow.querySelector('svg').style.transform = `rotate(${deg}deg)`;
}

// ── MINIMAP ──────────────────────────────────────────────────────────────────
const minimapEl   = document.getElementById('minimap');
const minimapSvg  = document.getElementById('minimap-svg');
const minimapVP   = document.getElementById('minimap-viewport');
const btnMinimap  = document.getElementById('btn-minimap');
let minimapVisible = false;
let minimapRaf = null;

// minimap size is dynamic - read from element
let MM_W = 300, MM_H = 200;
const CANVAS_SIZE = 3000;      // virtual canvas size

function updateMinimap() {
  if (!minimapVisible) return;
  const board = currentBoard();
  if (!board) return;

  // Find bounding box of all notes
  let minX = CANVAS_SIZE, minY = CANVAS_SIZE, maxX = 0, maxY = 0;
  board.notes.forEach(n => {
    const el = document.getElementById('note-' + n.id);
    const w = el ? el.offsetWidth : 200;
    const h = el ? el.offsetHeight : 150;
    minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + w); maxY = Math.max(maxY, n.y + h);
  });

  // If no notes, use center region
  if (!board.notes.length) {
    minX = 3500; minY = 3500; maxX = 4500; maxY = 4500;
  }

  // Add padding
  const pad = 200;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const rangeX = maxX - minX, rangeY = maxY - minY;

  // Read actual minimap size
  MM_W = minimapEl.offsetWidth || 300;
  MM_H = minimapEl.offsetHeight || 200;

  // Scale to fit minimap while keeping aspect ratio
  const scaleX = MM_W / rangeX;
  const scaleY = MM_H / rangeY;
  const mmScale = Math.min(scaleX, scaleY) * 0.88;
  const offX = (MM_W - rangeX * mmScale) / 2;
  const offY = (MM_H - rangeY * mmScale) / 2;

  function toMM(cx, cy) {
    const x = (cx - minX) * mmScale + offX;
    const y = (cy - minY) * mmScale + offY;
    if (!isFinite(x) || !isFinite(y)) return { x: 0, y: 0 };
    return { x, y };
  }

  // Clear and redraw
  minimapSvg.innerHTML = '';

  // Subtle grid background - adapts to theme
  const isDarkTheme = document.body.classList.contains('dark-bg');
  const gridColor = isDarkTheme ? 'rgba(255,255,255,0.05)' : 'rgba(140,100,60,0.1)';
  const gridG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  const gridStep = Math.max(8, MM_W / 10);
  if (!isFinite(gridStep) || gridStep <= 0) return;
  for (let x = 0; x < MM_W; x += gridStep) {
    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('x1', x); l.setAttribute('y1', 0);
    l.setAttribute('x2', x); l.setAttribute('y2', MM_H);
    l.setAttribute('stroke', gridColor); l.setAttribute('stroke-width', '0.5');
    gridG.appendChild(l);
  }
  for (let y = 0; y < MM_H; y += gridStep) {
    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('x1', 0); l.setAttribute('y1', y);
    l.setAttribute('x2', MM_W); l.setAttribute('y2', y);
    l.setAttribute('stroke', gridColor); l.setAttribute('stroke-width', '0.5');
    gridG.appendChild(l);
  }
  minimapSvg.appendChild(gridG);

  // Draw notes as glowing rounded rects
  const statusColors = {
    urgent:'#d94f3a', active:'#5baa6a', done:'#4a90d9',
    idea:'#d9b84a', blocked:'#9b6dd9', note:'#e07a3a',
  };
  board.notes.forEach(n => {
    const el = document.getElementById('note-' + n.id);
    const w = Math.max(4, (el ? el.offsetWidth : 200) * mmScale);
    const h = Math.max(3, (el ? el.offsetHeight : 150) * mmScale);
    const pos = toMM(n.x, n.y);
    const color = n.status ? (statusColors[n.status] || '#e07a3a') : 'rgba(200,180,155,0.7)';

    // Glow
    const glow = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    glow.setAttribute('x', pos.x - 1); glow.setAttribute('y', pos.y - 1);
    glow.setAttribute('width', w + 2); glow.setAttribute('height', h + 2);
    glow.setAttribute('rx', '3');
    glow.setAttribute('fill', color); glow.setAttribute('opacity', '0.12');
    minimapSvg.appendChild(glow);

    // Main rect
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', pos.x); rect.setAttribute('y', pos.y);
    rect.setAttribute('width', w); rect.setAttribute('height', h);
    rect.setAttribute('rx', '2');
    rect.setAttribute('fill', color); rect.setAttribute('opacity', '0.75');
    minimapSvg.appendChild(rect);
  });

  // Draw connections
  board.connections.forEach(conn => {
    const a = noteCenter(conn.from), b = noteCenter(conn.to);
    if (!a || !b) return;
    const pa = toMM(a.x, a.y), pb = toMM(b.x, b.y);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', pa.x); line.setAttribute('y1', pa.y);
    line.setAttribute('x2', pb.x); line.setAttribute('y2', pb.y);
    line.setAttribute('stroke', 'rgba(224,122,58,0.5)');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('stroke-linecap', 'round');
    minimapSvg.appendChild(line);
  });

  // Draw space markers on minimap
  if (board.markers) {
    board.markers.forEach(m => {
      const mp = toMM(m.x, m.y);
      const emoji = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      emoji.setAttribute('x', mp.x);
      emoji.setAttribute('y', mp.y + 4);
      emoji.setAttribute('font-size', '10');
      emoji.setAttribute('text-anchor', 'middle');
      emoji.setAttribute('dominant-baseline', 'middle');
      // Just use a colored dot on minimap
      const colors = {flag:'#e07a3a',photo:'#7a604e',shirt:'#5baa6a',dog:'#9b6dd9',heart:'#d94f3a'};
      emoji.setAttribute('font-size', '8');
      emoji.setAttribute('fill', colors[m.type] || '#e07a3a');
      emoji.textContent = '●';
      minimapSvg.appendChild(emoji);
    });
  }

  // Draw spawn marker on minimap
  if (spawnActive && board.spawnX !== undefined) {
    const sp = toMM(board.spawnX, board.spawnY);
    // Pin drop shape
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    // Outer circle (pin head)
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', sp.x);
    circle.setAttribute('cy', sp.y - 3);
    circle.setAttribute('r', '4');
    circle.setAttribute('fill', '#e07a3a');
    circle.setAttribute('stroke', 'white');
    circle.setAttribute('stroke-width', '1');
    g.appendChild(circle);
    // Inner dot
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', sp.x);
    dot.setAttribute('cy', sp.y - 3);
    dot.setAttribute('r', '1.5');
    dot.setAttribute('fill', 'white');
    g.appendChild(dot);
    // Pin stem
    const stem = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    stem.setAttribute('x1', sp.x);
    stem.setAttribute('y1', sp.y + 1);
    stem.setAttribute('x2', sp.x);
    stem.setAttribute('y2', sp.y + 3);
    stem.setAttribute('stroke', '#e07a3a');
    stem.setAttribute('stroke-width', '1.5');
    stem.setAttribute('stroke-linecap', 'round');
    g.appendChild(stem);
    minimapSvg.appendChild(g);
  }

  // Draw viewport indicator
  const r = wrap.getBoundingClientRect();
  // Current viewport in canvas coords
  const vpLeft   = (-vx) / vz;
  const vpTop    = (-vy) / vz;
  const vpRight  = vpLeft + r.width / vz;
  const vpBottom = vpTop  + r.height / vz;

  const tl = toMM(vpLeft, vpTop);
  const br = toMM(vpRight, vpBottom);
  const vpW = Math.max(8, br.x - tl.x);
  const vpH = Math.max(6, br.y - tl.y);

  minimapVP.style.left   = Math.max(0, tl.x) + 'px';
  minimapVP.style.top    = Math.max(0, tl.y) + 'px';
  minimapVP.style.width  = vpW + 'px';
  minimapVP.style.height = vpH + 'px';
}

function toggleMinimap() {
  minimapVisible = !minimapVisible;
  minimapEl.style.display = minimapVisible ? 'block' : 'none';
  btnMinimap.classList.toggle('active', minimapVisible);
  if (minimapVisible) {
    updateMinimap();
    // Auto-update while visible
    function loop() {
      if (!minimapVisible) return;
      updateMinimap();
      minimapRaf = requestAnimationFrame(loop);
    }
    minimapRaf = requestAnimationFrame(loop);
  } else {
    cancelAnimationFrame(minimapRaf);
  }
}

btnMinimap.addEventListener('click', e => {
  e.stopPropagation();
  toggleMinimap();
});

// Click on minimap to navigate
minimapEl.addEventListener('click', e => {
  e.stopPropagation();
  const board = currentBoard();
  if (!board || !board.notes.length) return;

  // Figure out what canvas coord was clicked
  const rect = minimapEl.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;

  // Reverse-engineer the minimap scale (simplified: navigate to approx center)
  // Just center viewport on clicked point in minimap proportion
  const board_notes = board.notes;
  let minX = 3000, minY = 3000, maxX = 0, maxY = 0;
  board_notes.forEach(n => {
    minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + 200); maxY = Math.max(maxY, n.y + 150);
  });
  const pad = 200;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const rangeX = maxX - minX, rangeY = maxY - minY;
  const mmScale = Math.min(MM_W / rangeX, MM_H / rangeY) * 0.9;
  const offX = (MM_W - rangeX * mmScale) / 2;
  const offY = (MM_H - rangeY * mmScale) / 2;

  const canvasX = (clickX - offX) / mmScale + minX;
  const canvasY = (clickY - offY) / mmScale + minY;

  const r2 = wrap.getBoundingClientRect();
  vx = r2.width  / 2 - canvasX * vz;
  vy = r2.height / 2 - canvasY * vz;
  applyTransform();
});




// ── UNDO / REDO HISTORY ───────────────────────────────────────────────────────
const HISTORY_MAX = 30;
let historyStack = [];
let historyIndex = -1;
let historyPaused = false;
let snapshotTimer = null;

// Debounced - won't fire more than once per 600ms
function scheduleSnapshot() {
  clearTimeout(snapshotTimer);
  snapshotTimer = setTimeout(takeSnapshot, 600);
}

function takeSnapshot() {
  if (historyPaused) return;
  const board = currentBoard();
  if (!board) return;

  // Trim future history if we're in the middle
  if (historyIndex < historyStack.length - 1) {
    historyStack = historyStack.slice(0, historyIndex + 1);
  }

  // Deep clone current board state
  const snapshot = JSON.stringify({
    notes: board.notes,
    connections: board.connections,
    textNodes: board.textNodes || [],
  });

  // Don't push if same as last snapshot
  if (historyStack[historyIndex] === snapshot) return;

  historyStack.push(snapshot);
  if (historyStack.length > HISTORY_MAX) historyStack.shift();
  historyIndex = historyStack.length - 1;

  updateUndoRedoBtns();
}

function updateUndoRedoBtns() {
  const undoBtn = document.getElementById('btn-undo');
  const redoBtn = document.getElementById('btn-redo');
  if (undoBtn) undoBtn.disabled = historyIndex <= 0;
  if (redoBtn) redoBtn.disabled = historyIndex >= historyStack.length - 1;
}

function applySnapshot(snapshot) {
  const board = currentBoard();
  if (!board) return;
  historyPaused = true;
  const state = JSON.parse(snapshot);
  board.notes = state.notes;
  board.connections = state.connections;
  board.textNodes = state.textNodes || [];

  // Re-render
  document.querySelectorAll('.note').forEach(e => e.remove());
  document.querySelectorAll('[id^="tn-"]').forEach(e => e.remove());
  document.querySelectorAll('.c-line').forEach(e => e.remove());
  board.notes.forEach(n => renderNote(n));
  board.textNodes.forEach(t => renderTextNode(t));
  board.connections.forEach(c => renderConnection(c));
  updateAllConnections();

  // Recalculate next IDs
  board.notes.forEach(n => { if (n.id >= nextNoteId) nextNoteId = n.id + 1; });
  board.connections.forEach(c => { if (c.id >= nextConnId) nextConnId = c.id + 1; });

  saveBoards();
  historyPaused = false;
  updateUndoRedoBtns();
}

function undo() {
  if (historyIndex <= 0) return;
  historyIndex--;
  applySnapshot(historyStack[historyIndex]);
  showToast('↩ Отменено');
}

function redo() {
  if (historyIndex >= historyStack.length - 1) return;
  historyIndex++;
  applySnapshot(historyStack[historyIndex]);
  showToast('↪ Повторено');
}

document.getElementById('btn-undo').addEventListener('click', e => { e.stopPropagation(); undo(); });
document.getElementById('btn-redo').addEventListener('click', e => { e.stopPropagation(); redo(); });

// Keyboard shortcuts (for desktop)
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.metaKey || e.ctrlKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
});

const SKIN_BACKGROUNDS = {
  'warm':'#fff8f0','cool':'#f0f4ff','sage':'#f0f7f0','rose':'#fff0f4',
  'lavender':'#f4f0ff',
  'grad-sunset':'linear-gradient(135deg,#fff0e8,#ffe8f5)',

  'glass':'rgba(255,255,255,0.25)',
};

function applyNoteSkin(note, el, skinId) {
  note.skin = skinId || null;
  el.removeAttribute('data-skin');
  el.style.background = '';
  el.style.backgroundImage = '';
  el.style.backgroundColor = '';
  el.style.backdropFilter = '';
  el.style.webkitBackdropFilter = '';

  // Reset child element styles
  el.querySelectorAll('.note-status').forEach(function(e) {
    e.style.background = ''; e.style.borderColor = ''; e.style.color = '';
  });
  el.querySelectorAll('.status-dot').forEach(function(e) { e.style.filter = ''; });
  el.querySelectorAll('.n-tag').forEach(function(e) {
    e.style.background = ''; e.style.color = ''; e.style.borderColor = '';
  });
  el.querySelectorAll('.n-title, .n-text').forEach(function(e) { e.style.color = ''; });

  if (skinId) {
    el.setAttribute('data-skin', skinId);
    var bg = SKIN_BACKGROUNDS[skinId];
    if (bg) {
      if (bg.startsWith('linear-gradient')) {
        el.style.backgroundImage = bg;
        el.style.backgroundColor = '';
      } else {
        el.style.backgroundColor = bg;
        el.style.backgroundImage = 'none';
      }
    }
    if (skinId === 'glass') {
      el.style.backdropFilter = 'blur(24px) saturate(2)';
      el.style.webkitBackdropFilter = 'blur(24px) saturate(2)';
    }

    // Apply dark skin child styles directly via JS
    var isDark = skinId === 'dark' || skinId === 'dark-blue' || skinId === 'dark-green';
    if (isDark) {
      var statusDotColors = {urgent:'#ff6060',active:'#60e878',done:'#60aaff',idea:'#ffd040',blocked:'#c080ff',note:'#ffa040'};
      el.querySelectorAll('.note-status').forEach(function(e) {
        e.style.background = 'rgba(255,255,255,0.1)';
        e.style.borderColor = 'rgba(255,255,255,0.18)';
        // Use the status-specific color
        var st = note.status;
        e.style.color = statusDotColors[st] || 'rgba(255,255,255,0.85)';
      });
      el.querySelectorAll('.status-dot').forEach(function(e) {
        var st = note.status;
        e.style.background = statusDotColors[st] || 'rgba(255,255,255,0.7)';
        e.style.filter = '';
      });
      el.querySelectorAll('.n-tag:not(.add)').forEach(function(e) {
        e.style.background = 'rgba(255,255,255,0.1)';
        e.style.color = 'rgba(255,255,255,0.7)';
      });
      el.querySelectorAll('.n-tag.add').forEach(function(e) {
        e.style.background = 'rgba(255,255,255,0.06)';
        e.style.color = 'rgba(255,255,255,0.35)';
      });
      el.querySelectorAll('.n-title').forEach(function(e) { e.style.color = 'rgba(255,255,255,0.85)'; });
      el.querySelectorAll('.n-text').forEach(function(e) { e.style.color = 'rgba(255,255,255,0.5)'; });
      var dot = el.querySelector('.n-dot');
      if (dot) dot.style.opacity = '0.5';
    }
  }
  saveBoards();
}

// ── INLINE TAG INPUT ─────────────────────────────────────────────────────────
function showTagInput(note, noteEl, anchorEl) {
  // Remove any existing tag input
  document.querySelectorAll('.tag-input-bubble').forEach(e => e.remove());

  const bubble = document.createElement('div');
  bubble.className = 'tag-input-bubble';

  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'Тег...';
  input.maxLength = 20;

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'tag-confirm-btn';
  confirmBtn.innerHTML = '✓';

  bubble.appendChild(input);
  bubble.appendChild(confirmBtn);

  // Position above the + tag button
  const rect = anchorEl.getBoundingClientRect();
  bubble.style.cssText = `position:fixed;left:${Math.max(8, rect.left - 10)}px;top:${rect.top - 54}px;`;

  document.body.appendChild(bubble);
  input.focus();

  function confirm() {
    const val = input.value.trim();
    if (val) {
      note.tags.push(val);
      saveBoards();
      // Re-render the entire note to show new tag
      const fresh = document.getElementById('note-' + note.id);
      if (fresh) {
        const foot = fresh.querySelector('.n-foot');
        if (foot) {
          // Remove all existing tag buttons (keep only + tag)
          foot.querySelectorAll('.n-tag:not(.add)').forEach(t => t.remove());
          // Re-add all tags before the + tag button
          const addBtn = foot.querySelector('.n-tag.add');
          note.tags.forEach(tag => {
            const t = document.createElement('button');
            t.className = 'n-tag'; t.textContent = tag;
            foot.insertBefore(t, addBtn);
          });
        }
      }
    }
    bubble.remove();
  }

  function cancel() { bubble.remove(); }

  confirmBtn.addEventListener('click', e => { e.stopPropagation(); confirm(); });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); confirm(); }
    if (e.key === 'Escape') cancel();
  });

  // Close on outside tap
  setTimeout(() => {
    document.addEventListener('pointerdown', function handler(e) {
      if (!bubble.contains(e.target)) { cancel(); document.removeEventListener('pointerdown', handler); }
    });
  }, 50);
}

const markersPanel = document.getElementById('markers-panel');
const btnMarkers   = document.getElementById('btn-markers');

function getMarkers() {
  const board = currentBoard();
  if (!board) return [];
  if (!board.markers) board.markers = [];
  return board.markers;
}

function saveMarkers() {
  saveBoards();
}

function renderMarker(m) {
  const el = document.createElement('div');
  el.className = 'space-marker';
  el.id = 'marker-' + m.id;
  el.innerHTML = MARKER_SVGS[m.type] || MARKER_SVGS['flag'];
  el.style.left = m.x + 'px';
  el.style.top  = m.y + 'px';

  // Drag
  el.addEventListener('pointerdown', e => {
    if (e.target.closest('.note') || connectMode) return;
    e.stopPropagation();
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    let moved = false;
    function onMove(ev) {
      moved = true;
      const x = (ev.clientX - vx) / vz;
      const y = (ev.clientY - vy) / vz;
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      m.x = x; m.y = y;
    }
    function onUp() {
      el.removeEventListener('pointermove', onMove);
      el.removeEventListener('pointerup', onUp);
      if (moved) saveMarkers();
    }
    el.addEventListener('pointermove', onMove);
    el.addEventListener('pointerup', onUp);
  });

  // Double-tap to delete
  let lastTap = 0;
  el.addEventListener('click', e => {
    e.stopPropagation();
    const now = Date.now();
    if (now - lastTap < 300) {
      el.remove();
      const board = currentBoard();
      if (board) board.markers = board.markers.filter(mk => mk.id !== m.id);
      saveMarkers();
    }
    lastTap = now;
  });

  canvas.appendChild(el);
}

function renderAllMarkers() {
  document.querySelectorAll('.space-marker').forEach(e => e.remove());
  getMarkers().forEach(m => renderMarker(m));
}

function addMarker(type) {
  const board = currentBoard();
  if (!board) return;
  if (!board.markers) board.markers = [];
  // Place at center of current view
  const r = wrap.getBoundingClientRect();
  const x = (r.width  / 2 - vx) / vz;
  const y = (r.height / 2 - vy) / vz;
  const m = { id: Date.now(), type, x, y };
  board.markers.push(m);
  renderMarker(m);
  saveMarkers();
  // Close panel
  markersPanel.classList.remove('open');
  btnMarkers.style.color = '';
}

function haptic(type) { type = type || 'light';

    const patterns = { light: 5, medium: 10, heavy: 20, success: [5,50,5] };
    window.navigator.vibrate(patterns[type] || 5);

// ── DISINTEGRATION EFFECT (Thanos snap) ──────────────────────────────────────
function disintegrateNote(el, onDone) {
  const rect = el.getBoundingClientRect();
  const W = rect.width, H = rect.height;
  const cx = rect.left, cy = rect.top;

  // Sample colors from the note - use its bg color or default warm tones
  const colors = [
    'rgba(224,122,58,0.85)',
    'rgba(200,160,100,0.75)',
    'rgba(180,140,80,0.7)',
    'rgba(240,180,120,0.8)',
    'rgba(160,120,70,0.65)',
    'rgba(255,200,140,0.75)',
    'rgba(220,170,110,0.7)',
  ];

  const PARTICLES = 80;
  const particles = [];

  for (let i = 0; i < PARTICLES; i++) {
    const p = document.createElement('div');
    p.className = 'dust-particle';

    const px = cx + Math.random() * W;
    const py = cy + Math.random() * H;
    const size = 2 + Math.random() * 6;
    const angle = -Math.PI * 0.8 + Math.random() * Math.PI * 1.6;
    const dist = 40 + Math.random() * 160;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist + Math.random() * 60;
    const dur = 500 + Math.random() * 700;
    const delay = Math.random() * 250;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const round = Math.random() > 0.5;

    p.style.cssText = 'left:' + px + 'px;top:' + py + 'px;width:' + size + 'px;height:' + size + 'px;background:' + color + ';border-radius:' + (round ? '50%' : '2px') + ';opacity:0.9';
    document.body.appendChild(p);

    // Animate with rAF
    const startTime = performance.now() + delay;
    particles.push({ el: p, tx, ty, dur, startTime });
  }

  // Animate all particles with rAF loop
  function animParticles(now) {
    let anyAlive = false;
    particles.forEach(pt => {
      if (now < pt.startTime) { anyAlive = true; return; }
      const t = Math.min(1, (now - pt.startTime) / pt.dur);
      const ease = 1 - Math.pow(1 - t, 3); // ease out cubic
      pt.el.style.transform = 'translate(' + (pt.tx * ease) + 'px,' + (pt.ty * ease) + 'px) scale(' + (1 - t) + ')';
      pt.el.style.opacity = (0.9 * (1 - t));
      if (t < 1) anyAlive = true;
      else pt.el.remove();
    });
    if (anyAlive) requestAnimationFrame(animParticles);
  }
  requestAnimationFrame(animParticles);

  // Animate the note itself - crumble from right to left
  el.style.transition = 'none';
  el.style.transformOrigin = 'center center';

  let frame = 0;
  const totalFrames = 35;
  function crumble() {
    frame++;
    const t = frame / totalFrames;
    const eased = t * t;
    // Shift right as it dissolves
    el.style.transform = `translateX(${eased * 20}px) scale(${1 - eased * 0.3})`;
    el.style.opacity = Math.max(0, 1 - t * 1.4);
    el.style.filter = `blur(${eased * 3}px)`;
    if (frame < totalFrames) {
      requestAnimationFrame(crumble);
    } else {
      el.remove();
    }
  }
  requestAnimationFrame(crumble);

  if (onDone) setTimeout(onDone, 1200);
}

function escHtml(s) {
return s.replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’);
}

function inlineFormat(s) {
s = escHtml(s);
s = s.replace(/`([^`]+)`/g, ‘<code>$1</code>’);
s = s.replace(/***(.+?)***/g, ‘<strong><em>$1</em></strong>’);
s = s.replace(/**(.+?)**/g, ‘<strong>$1</strong>’);
s = s.replace(/**(.+?)**/g, ‘<u>$1</u>’);
s = s.replace(/*(.+?)*/g, ‘<em>$1</em>’);
s = s.replace(/*(.+?)*/g, ‘<em>$1</em>’);
s = s.replace(/~(.+?)~/g, ‘<s>$1</s>’);
s = s.replace(/[(.+?)]((.+?))/g, ‘<a href="$2" target="_blank">$1</a>’);
// Images (must come before link replacement, but we handle separately in block)
return s;
}

function renderBlockImages(html) {
// Replace ![alt](src) with img tags
return html.replace(/![([^]]*)](([^)]+))/g, ‘<img src="$2" alt="$1" style="max-width:100%;border-radius:10px;margin:6px 0;display:block">’);
}

function insertAtCursor(before, after, placeholder) {
const ta = neEditor;
const start = ta.selectionStart;
const end   = ta.selectionEnd;
const sel   = ta.value.substring(start, end) || placeholder || ‘’;
const newText = before + sel + (after || ‘’);
ta.value = ta.value.substring(0, start) + newText + ta.value.substring(end);
const cur = start + before.length + sel.length + (after ? after.length : 0);
ta.selectionStart = start + before.length;
ta.selectionEnd   = start + before.length + sel.length;
ta.focus();
ta.dispatchEvent(new Event(‘input’));
}

function insertLine(prefix, placeholder) {
const ta = neEditor;
const start = ta.selectionStart;
// Find start of current line
const before = ta.value.lastIndexOf(’\n’, start - 1);
const lineStart = before + 1;
const lineEnd = ta.value.indexOf(’\n’, start);
const lineText = ta.value.substring(lineStart, lineEnd === -1 ? undefined : lineEnd);
const newLine = prefix + (lineText || placeholder || ‘’);
ta.value = ta.value.substring(0, lineStart) + newLine + (lineEnd === -1 ? ‘’ : ta.value.substring(lineEnd));
ta.selectionStart = ta.selectionEnd = lineStart + prefix.length + (lineText || placeholder || ‘’).length;
ta.focus();
ta.dispatchEvent(new Event(‘input’));
}
